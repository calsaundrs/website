<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Venues API</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #1a1a1a; color: white; }
        .venue { border: 1px solid #333; padding: 10px; margin: 10px 0; border-radius: 5px; }
        .link { color: #E83A99; text-decoration: none; }
        .link:hover { text-decoration: underline; }
        .error { color: #ff6b6b; }
        .success { color: #51cf66; }
    </style>
</head>
<body>
    <h1>Test Venues API</h1>
    <button onclick="testAPI()">Test API</button>
    <div id="results"></div>

    <script>
        async function testAPI() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = 'Loading...';
            
            try {
                console.log('Testing API...');
                const response = await fetch('/.netlify/functions/get-venues-firestore');
                console.log('Response status:', response.status);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                console.log('API Response:', data);
                
                let html = '<h2>API Response:</h2>';
                html += `<p><strong>Total venues:</strong> ${data.venues ? data.venues.length : 'No venues array'}</p>`;
                html += `<p><strong>Version:</strong> ${data.version || 'Unknown'}</p>`;
                
                if (data.venues && data.venues.length > 0) {
                    html += '<h3>Venues:</h3>';
                    data.venues.forEach((venue, index) => {
                        html += `
                            <div class="venue">
                                <p><strong>${index + 1}. ${venue.name}</strong></p>
                                <p>ID: ${venue.id}</p>
                                <p>Slug: ${venue.slug || 'NO SLUG!'}</p>
                                <p>Address: ${venue.address}</p>
                                <p>Image: ${venue.image ? venue.image.url : 'No image'}</p>
                                <p>Categories: ${venue.category ? venue.category.join(', ') : 'No categories'}</p>
                                <a href="/venue/${venue.slug}" class="link" target="_blank">Test Link: /venue/${venue.slug}</a>
                            </div>
                        `;
                    });
                } else {
                    html += '<p class="error">No venues found in response</p>';
                }
                
                resultsDiv.innerHTML = html;
                
            } catch (error) {
                console.error('Error testing API:', error);
                resultsDiv.innerHTML = `<p class="error">Error: ${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
