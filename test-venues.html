<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Venues API</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #1a1a1a; color: white; }
        .venue { border: 1px solid #333; padding: 10px; margin: 10px 0; border-radius: 5px; }
        .link { color: #E83A99; text-decoration: none; }
        .link:hover { text-decoration: underline; }
        .error { color: #ff6b6b; }
        .success { color: #51cf66; }
    </style>

    <!-- FOUC Prevention: Critical CSS and Loading Screen -->
    <style>
        /* FOUC Prevention - Hide content until styles are loaded */
        .fouc-prevention {
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        
        .fouc-prevention.loaded {
            visibility: visible;
            opacity: 1;
        }
        
        /* Loading screen */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #121212 0%, #1a1a1a 50%, #2d1b69 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        
        .loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }
        
        .loading-logo {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }
        
        .loading-text {
            color: #B564F7;
            font-family: 'Poppins', sans-serif;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(181, 100, 247, 0.3);
            border-top: 3px solid #B564F7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Critical CSS to prevent flashing */
        body {
            background-color: #121212;
            color: #EAEAEA;
            font-family: 'Poppins', system-ui, -apple-system, sans-serif;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            margin: 0;
            padding: 0;
        }
        
        /* Basic layout styles to prevent layout shift */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
        }
        
        /* Prevent pride flag from flashing at full size */
        img[src*="progressflag"] {
            height: 1.5rem !important;
            width: auto !important;
            max-width: 1.5rem !important;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        /* Show flag after page loads */
        .flag-loaded img[src*="progressflag"] {
            opacity: 1;
        }
    </style>
    
    <!-- FOUC Prevention Script -->
    <script src="/js/fouc-prevention.js"></script>
    </head>
<body>
    <h1>Test Venues API</h1>
    <button onclick="testAPI()">Test API</button>
    <div id="results"></div>

    <script>
        async function testAPI() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = 'Loading...';
            
            try {
                console.log('Testing API...');
                const response = await fetch('/.netlify/functions/get-venues-firestore');
                console.log('Response status:', response.status);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                console.log('API Response:', data);
                
                let html = '<h2>API Response:</h2>';
                html += `<p><strong>Total venues:</strong> ${data.venues ? data.venues.length : 'No venues array'}</p>`;
                html += `<p><strong>Version:</strong> ${data.version || 'Unknown'}</p>`;
                
                if (data.venues && data.venues.length > 0) {
                    html += '<h3>Venues:</h3>';
                    data.venues.forEach((venue, index) => {
                        html += `
                            <div class="venue">
                                <p><strong>${index + 1}. ${venue.name}</strong></p>
                                <p>ID: ${venue.id}</p>
                                <p>Slug: ${venue.slug || 'NO SLUG!'}</p>
                                <p>Address: ${venue.address}</p>
                                <p>Image: ${venue.image ? venue.image.url : 'No image'}</p>
                                <p>Categories: ${venue.category ? venue.category.join(', ') : 'No categories'}</p>
                                <a href="/venue/${venue.slug}" class="link" target="_blank">Test Link: /venue/${venue.slug}</a>
                            </div>
                        `;
                    });
                } else {
                    html += '<p class="error">No venues found in response</p>';
                }
                
                resultsDiv.innerHTML = html;
                
            } catch (error) {
                console.error('Error testing API:', error);
                resultsDiv.innerHTML = `<p class="error">Error: ${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
