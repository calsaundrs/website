<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fix The Hub Place ID</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-8">
    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-bold mb-4">Fix The Hub Google Place ID</h1>
        <p class="mb-4">This will update The Hub's Google Place ID from the full URL to the extracted Place ID.</p>
        <button id="fixBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded">
            Fix Place ID
        </button>
        <div id="result" class="mt-4"></div>
    </div>

    <script>
        document.getElementById('fixBtn').addEventListener('click', async () => {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Fixing...';
            
            try {
                const response = await fetch('/.netlify/functions/update-venue', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        venueId: 'z7sXxSqpCeUDsnnsr4B7',
                        'google-place-id': '0x4870bc632404df1b:0x30887b950fadaed5'
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    resultDiv.innerHTML = '<p class="text-green-400">✅ Google Place ID updated successfully!</p>';
                } else {
                    resultDiv.innerHTML = `<p class="text-red-400">❌ Error: ${result.message}</p>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<p class="text-red-400">❌ Error: ${error.message}</p>`;
            }
        });
    </script>
</body>
</html>
