<!-- DESCRIPTION: Learn more about Brum Outloud and our mission to celebrate    <div class="max-w-4xl mx-auto px-4 py-12">
        <h1 class="text-6xl font-anton text-white mb-8">About Birmingham's LGBTQ+ Scene</h1>
        
        <div class="prose prose-invert prose-xl max-w-none">
            <p class="text-2xl text-zinc-300 leading-relaxed mb-8">
                Birmingham's LGBTQ+ scene is one of the most vibrant and diverse in the UK. 
                From the historic Gay Village around Hurst Street to the emerging alternative 
                spaces in Digbeth, there's something for everyone.
            </p>

            <div class="grid md:grid-cols-2 gap-8 my-12">
                <div class="bg-zinc-900/50 border border-zinc-800 p-8 rounded-2xl">
                    <h2 class="text-3xl font-anton text-pink-500 mb-4">THE GAY VILLAGE</h2>
                    <p class="text-zinc-400">
                        The heart of our community for decades. Home to legendary venues like The Nightingale, 
                        The Loft, and Missing. It's where the party never stops.
                    </p>
                </div>
                <div class="bg-zinc-900/50 border border-zinc-800 p-8 rounded-2xl">
                    <h2 class="text-3xl font-anton text-cyan-400 mb-4">ALTERNATIVE SCENE</h2>
                    <p class="text-zinc-400">
                        Exploring beyond the village. Places like the Hare & Hounds and Sunflower Lounge 
                        host incredible queer-led events, drag shows, and underground parties.
                    </p>
                </div>
            </div>

            <h2 class="text-4xl font-anton text-white mb-6">WHY BRUM OUTLOUD?</h2>
            <p class="text-zinc-400 mb-6">
                We believe that every part of our community deserves to be seen and heard. 
                Whether you're a promoter trying to fill a dance floor or a newcomer looking 
                for your tribe, we're here to bridge that gap.
            </p>

            <blockquote class="border-l-4 border-pink-500 pl-8 my-12 italic text-2xl text-zinc-300">
                "Our mission is to celebrate, protect, and grow the LGBTQ+ spaces that make 
                Birmingham the incredible city it is."
            </blockquote>
        </div>
    </div>
