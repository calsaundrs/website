<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Critical Maintenance | Brum Outloud</title>
    <meta name="description" content="Brum Outloud is currently down for critical maintenance. We'll be back shortly!">
    <meta name="robots" content="noindex, nofollow">

    <!-- External Fonts & CSS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Poppins:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        :root {
            --accent-pink: #E83A99;
            --accent-purple: #B564F7;
            --bg-dark: #0a0a0a;
            --glass-bg: rgba(17, 24, 39, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            color: #EAEAEA;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0d2e 50%, #0a0a0a 100%);
        }

        .video-background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
        }

        .background-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.4;
        }

        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: -1;
        }

        .container {
            max-width: 800px;
            padding: 2rem;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
            padding: 4rem 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: cardFadeIn 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .font-anton {
            font-family: 'Anton', sans-serif;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .heading-gradient {
            background: linear-gradient(135deg, #FFFFFF 0%, var(--accent-pink) 50%, var(--accent-purple) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 5rem;
            line-height: 1;
            margin-bottom: 1.5rem;
            animation: textGlow 3s ease-in-out infinite alternate;
        }

        @media (max-width: 768px) {
            .heading-gradient {
                font-size: 3rem;
            }
        }

        .subtext {
            font-size: 1.25rem;
            color: #ccc;
            margin-bottom: 2.5rem;
            line-height: 1.8;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            background: rgba(232, 58, 153, 0.1);
            border: 1px solid var(--accent-pink);
            color: var(--accent-pink);
            padding: 0.5rem 1.25rem;
            border-radius: 9999px;
            font-weight: 600;
            font-size: 0.875rem;
            margin-bottom: 2rem;
            animation: pulse 2s infinite;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
        }

        .social-link {
            color: #EAEAEA;
            font-size: 1.5rem;
            transition: all 0.3s ease;
        }

        .social-link:hover {
            color: var(--accent-pink);
            transform: translateY(-3px);
        }

        .progress-flag {
            height: 2rem;
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.2));
        }

        @keyframes cardFadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes textGlow {
            0% {
                text-shadow: 0 0 10px rgba(232, 58, 153, 0.2);
            }

            100% {
                text-shadow: 0 0 25px rgba(181, 100, 247, 0.5);
            }
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(232, 58, 153, 0.4);
            }

            70% {
                transform: scale(1.02);
                box-shadow: 0 0 0 10px rgba(232, 58, 153, 0);
            }

            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(232, 58, 153, 0);
            }
        }

        /* Animated background particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.1;
            animation: float linear infinite;
        }

        @keyframes float {
            from {
                transform: translateY(100vh) translateX(0);
            }

            to {
                transform: translateY(-100px) translateX(20px);
            }
        }
    </style>
</head>

<body>
    <div class="video-background-container">
        <div class="video-overlay"></div>
        <video autoplay loop muted playsinline class="background-video" preload="metadata">
            <source src="/HouseOfAllureReel.mp4" type="video/mp4">
        </video>
    </div>

    <div class="particles" id="particles"></div>

    <div class="container">
        <div class="card">
            <img src="/progressflag.svg.png" alt="Progress Pride Flag" class="progress-flag">

            <div class="status-badge">
                <i class="fas fa-tools mr-2"></i> CRITICAL MAINTENANCE IN PROGRESS
            </div>

            <h1 class="font-anton heading-gradient">Polishing<br>The Scene</h1>

            <p class="subtext">
                Brum Outloud is currently down for critical maintenance. We're working hard to make your guide to
                Birmingham's LGBTQ+ scene even better.
            </p>

            <div class="social-links">
                <a href="https://www.instagram.com/brumoutloud/" class="social-link" target="_blank">
                    <i class="fab fa-instagram"></i>
                </a>
            </div>
        </div>
    </div>

    <script>
        // Create subtle floating particles
        const particlesContainer = document.getElementById('particles');
        const particleCount = 20;

        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';

            const size = Math.random() * 4 + 2;
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;

            particle.style.left = `${Math.random() * 100}%`;
            particle.style.animationDuration = `${Math.random() * 10 + 10}s`;
            particle.style.animationDelay = `${Math.random() * 10}s`;

            particlesContainer.appendChild(particle);
        }
    </script>
</body>

</html>
