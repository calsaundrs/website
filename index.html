<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glow Up in Progress | Brum Outloud</title>
    <meta name="description" content="Brum Outloud is having a quick costume change. We'll be back on stage shortly!">
    <meta name="robots" content="noindex, nofollow">

    <!-- External Fonts & CSS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        :root {
            --accent-pink: #ec4899;
            --accent-purple: #c026d3;
            --bg-dark: #09090b;
            --glass-bg: rgba(24, 24, 27, 0.45);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            color: #f4f4f5;
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% -20%, #2e1065 0%, #09090b 70%);
            background-attachment: fixed;
        }

        .video-background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
        }

        .background-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.3;
        }

        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: -1;
        }

        .container {
            max-width: 800px;
            padding: 1.5rem;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 3rem;
            padding: 3.5rem 2rem;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.7);
            animation: cardEntrance 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative;
        }

        @keyframes cardEntrance {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(40px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .font-anton {
            font-family: 'Outfit', sans-serif;
            letter-spacing: -0.02em;
            text-transform: none;
            font-weight: 800;
        }

        .heading-gradient {
            background: linear-gradient(135deg, #fdf4ff 0%, #f472b6 40%, #c026d3 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 5rem;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            animation: glowCycle 4s ease-in-out infinite alternate;
        }

        @media (max-width: 768px) {
            .heading-gradient {
                font-size: 3.5rem;
            }
        }

        .subtext {
            font-size: 1.35rem;
            color: #ccc;
            margin-bottom: 2.5rem;
            line-height: 1.6;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            font-weight: 400;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            background: rgba(236, 72, 153, 0.1);
            border: 1px solid rgba(236, 72, 153, 0.4);
            color: #fff;
            padding: 0.6rem 1.5rem;
            border-radius: 9999px;
            font-weight: 700;
            font-size: 0.9rem;
            margin-bottom: 2.5rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .status-badge i {
            margin-right: 0.75rem;
            color: var(--accent-pink);
        }

        .social-link {
            display: inline-flex;
            align-items: center;
            color: #EAEAEA;
            font-size: 1.8rem;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 1rem;
        }

        .social-link:hover {
            color: var(--accent-pink);
            transform: scale(1.2) rotate(8deg);
            filter: drop-shadow(0 0 10px var(--accent-pink));
        }

        .progress-flag {
            height: 2.5rem;
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.3));
        }

        /* Fun Floating Emojis */
        .floating-emoji {
            position: absolute;
            font-size: 2rem;
            pointer-events: none;
            z-index: -1;
            opacity: 0.6;
            animation: floatEmoji 6s ease-in-out infinite;
        }

        @keyframes floatEmoji {

            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }

            50% {
                transform: translateY(-20px) rotate(15deg);
            }
        }

        @keyframes glowCycle {
            0% {
                filter: drop-shadow(0 0 5px rgba(232, 58, 153, 0.3));
            }

            100% {
                filter: drop-shadow(0 0 20px rgba(181, 100, 247, 0.6));
            }
        }

        .glitter-particle {
            position: absolute;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            animation: twinkle var(--duration) ease-in-out infinite;
        }

        @keyframes twinkle {

            0%,
            100% {
                opacity: 0;
                transform: scale(0.5);
            }

            50% {
                opacity: 0.8;
                transform: scale(1.2);
            }
        }
    </style>
</head>

<body>
    <div class="video-background-container">
        <div class="video-overlay"></div>
        <video autoplay loop muted playsinline class="background-video" preload="metadata">
            <source src="/HouseOfAllureReel.mp4" type="video/mp4">
        </video>
    </div>

    <div id="glitter-container"></div>

    <div class="container">
        <div class="card">
            <!-- Cheeky Floating Elements Around Card -->
            <span class="floating-emoji" style="top: -20px; left: -10px; animation-delay: 0s;">✨</span>
            <span class="floating-emoji" style="top: 10px; right: -20px; animation-delay: 1.5s;">💅</span>
            <span class="floating-emoji" style="bottom: -15px; left: 20%; animation-delay: 3s;">💄</span>
            <span class="floating-emoji" style="top: 40%; right: -25px; animation-delay: 4.5s;">🏳️‍🌈</span>


            <div class="status-badge">
                <i class="fas fa-magic"></i> Backstage: Fixing Our Wig
            </div>

            <h1 class="font-anton heading-gradient">Getting Our<br>Glow Up</h1>

            <p class="subtext">
                Brum Outloud is having a quick mid-show costume change. We'll be back center stage with all your
                favorite events in just a flash!
            </p>

            <a href="https://www.instagram.com/brumoutloud/" class="social-link" target="_blank"
                aria-label="Follow us on Instagram">
                <i class="fab fa-instagram"></i>
            </a>
        </div>
    </div>

    <script>
        // Create subtle floating glitter
        const glitterContainer = document.getElementById('glitter-container');
        const particleCount = 40;

        for (let i = 0; i < particleCount; i++) {
            const p = document.createElement('div');
            p.className = 'glitter-particle';

            const size = Math.random() * 3 + 1;
            p.style.width = `${size}px`;
            p.style.height = `${size}px`;

            p.style.left = `${Math.random() * 100}%`;
            p.style.top = `${Math.random() * 100}%`;

            p.style.setProperty('--duration', `${Math.random() * 3 + 2}s`);
            p.style.animationDelay = `${Math.random() * 5}s`;

            glitterContainer.appendChild(p);
        }
    </script>
</body>

</html>
