<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Admin Button - BrumOutLoud</title>
    <meta name="description" content="Test page for admin button functionality">
    
    <!-- Styles -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="/css/main.css">
    
    <style>
        body {
            background: linear-gradient(135deg, #111827 0%, #7C3AED 50%, #111827 100%);
            color: #EAEAEA;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
        }
        .font-anton {
            font-family: 'Anton', sans-serif;
            letter-spacing: 0.05em;
        }
        .accent-color { color: #E83A99; }
        .bg-accent-color { background-color: #E83A99; }
        .card-bg {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(75, 85, 99, 0.3);
            border-radius: 1.25rem;
        }
        .btn-primary {
            background: linear-gradient(135deg, #E83A99 0%, #8B5CF6 100%);
            border: 1px solid rgba(232, 58, 153, 0.3);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #D61F69 0%, #7C3AED 100%);
            transform: translateY(-1px);
        }
        .heading-gradient {
            background: linear-gradient(135deg, #FFFFFF 0%, #E83A99 50%, #8B5CF6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
    </style>

    <!-- FOUC Prevention: Critical CSS and Loading Screen -->
    <style>
        /* FOUC Prevention - Hide content until styles are loaded */
        .fouc-prevention {
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        
        .fouc-prevention.loaded {
            visibility: visible;
            opacity: 1;
        }
        
        /* Loading screen */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #121212 0%, #1a1a1a 50%, #2d1b69 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        
        .loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }
        
        .loading-logo {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }
        
        .loading-text {
            color: #B564F7;
            font-family: 'Poppins', sans-serif;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(181, 100, 247, 0.3);
            border-top: 3px solid #B564F7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Critical CSS to prevent flashing */
        body {
            background-color: #121212;
            color: #EAEAEA;
            font-family: 'Poppins', system-ui, -apple-system, sans-serif;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            margin: 0;
            padding: 0;
        }
        
        /* Basic layout styles to prevent layout shift */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
        }
        
        /* Prevent pride flag from flashing at full size */
        img[src*="progressflag"] {
            height: 1.5rem !important;
            width: auto !important;
            max-width: 1.5rem !important;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        /* Show flag after page loads */
        .flag-loaded img[src*="progressflag"] {
            opacity: 1;
        }
    </style>
    
    <!-- FOUC Prevention Script -->
    <script src="/js/fouc-prevention.js"></script>
    </head>
<body>
    <!-- Header -->
        <header
        class="p-6 sticky top-0 z-[100] bg-[#09090b]/80 backdrop-blur-xl border-b border-white/5 transition-all duration-300">
        <nav class="container mx-auto flex justify-between items-center max-w-7xl">
            <!-- Site name with consolidated flag image and fallback -->
            <a href="/" class="flex items-center text-3xl font-extrabold tracking-tight text-white group"
                style="font-family: 'Outfit', sans-serif;">
                <span
                    class="bg-clip-text text-transparent bg-gradient-to-r from-white to-zinc-400 group-hover:to-pink-400 transition-all duration-300">Brum
                    Outloud</span>
                <!-- Consolidated flag image: tries to load header_flag.png, falls back to emoji placeholder -->
                <img src="/progressflag.svg.png" alt="LGBTQ+ Flag"
                    class="h-6 w-auto ml-3 inline-block rounded-sm drop-shadow-md group-hover:scale-110 transition-transform duration-300"
                    loading="lazy"
                    onerror="this.src='https://placehold.co/24x24/000000/FFFFFF?text=🏳️‍🌈'; this.onerror=null;"
                    onload="document.body.classList.add('flag-loaded')">
            </a>
            <div class="hidden lg:flex items-center space-x-8 font-medium text-sm tracking-wide">
                <a href="/events.html" class="text-zinc-400 hover:text-white transition-colors duration-200">WHAT'S ON</a>
                <a href="/all-venues.html"
                    class="text-zinc-400 hover:text-white transition-colors duration-200">VENUES</a>
                <a href="/community.html"
                    class="text-zinc-400 hover:text-white transition-colors duration-200">COMMUNITY</a>
                <a href="/contact.html"
                    class="text-zinc-400 hover:text-white transition-colors duration-200">CONTACT</a>
                <a href="https://brumoutloud.co.uk/promoter-submit-new" class="nav-cta ml-4">
                    GET LISTED
                </a>
            </div>
            <div class="lg:hidden relative z-[60]">
                <button id="menu-btn" class="btn-menu text-white text-2xl group flex flex-col gap-1.5 p-2"
                    aria-label="Menu">
                    <span class="w-6 h-0.5 bg-white rounded-full transition-all group-hover:bg-pink-400"></span>
                    <span class="w-6 h-0.5 bg-white rounded-full transition-all group-hover:bg-pink-400"></span>
                    <span
                        class="w-4 h-0.5 bg-white rounded-full transition-all group-hover:bg-pink-400 self-end"></span>
                </button>
            </div>
        </nav>
        <div id="menu"
            class="hidden lg:hidden fixed inset-0 bg-[#09090b]/95 backdrop-blur-2xl z-50 flex-col items-center justify-center space-y-8 font-semibold">
            <a href="/events.html" class="block text-white text-3xl hover:text-pink-400 transition-colors">WHAT'S ON</a>
            <a href="/all-venues.html"
                class="block text-white text-3xl hover:text-pink-400 transition-colors">VENUES</a>
            <a href="/community.html"
                class="block text-white text-3xl hover:text-pink-400 transition-colors">COMMUNITY</a>
            <a href="/contact.html" class="block text-white text-3xl hover:text-pink-400 transition-colors">CONTACT</a>
            <a href="https://brumoutloud.co.uk/promoter-submit-new" class="nav-cta mt-8 text-xl px-10 py-4 shadow-pink-500/20 shadow-xl">
                GET LISTED
            </a>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-8 py-8">
        <div class="text-center mb-8">
            <h1 class="font-anton text-5xl md:text-6xl leading-none tracking-wider heading-gradient">
                TEST <span class="accent-color">ADMIN BUTTON</span>
            </h1>
            <p class="mt-4 text-xl text-gray-300 max-w-2xl mx-auto">Test the admin button functionality</p>
        </div>

        <!-- Test Button -->
        <div class="card-bg p-8 md:p-12 mb-8 rounded-2xl">
            <h2 class="font-anton text-3xl text-white mb-6 border-b border-gray-700 pb-2">
                <i class="fas fa-calendar-alt mr-3 accent-color"></i>Event Rebuild Button
            </h2>
            
            <div class="space-y-6">
                <div class="text-center">
                    <button id="rebuild-events-btn" class="admin-link rounded-xl p-6 relative group text-left w-full max-w-md mx-auto">
                        <div class="flex items-center justify-between mb-4">
                            <div class="text-2xl text-accent-color">
                                <i class="fas fa-calendar-alt"></i>
                            </div>
                            <div id="rebuild-events-status" class="hidden">
                                <div class="animate-spin rounded-full h-6 w-6 border-b-2 border-accent-color"></div>
                            </div>
                        </div>
                        <h3 class="text-xl font-bold text-white mb-2">Rebuild Event Pages</h3>
                        <p class="text-gray-400 text-sm">Regenerate all static event pages with latest data</p>
                        <div class="flex items-center justify-between mt-4">
                            <div class="text-accent-color group-hover:translate-x-2 transition-transform">
                                <i class="fas fa-arrow-right"></i>
                            </div>
                            <div id="last-rebuild-events-info" class="text-xs text-gray-500 hidden">
                                <span id="last-rebuild-events-time">-</span>
                            </div>
                        </div>
                    </button>
                </div>
                
                <div id="test-results" class="text-center">
                    <div class="text-gray-400">Click the button above to test</div>
                </div>
            </div>
        </div>

        <!-- Debug Info -->
        <div class="card-bg p-8 md:p-12 rounded-2xl">
            <h2 class="font-anton text-3xl text-white mb-6 border-b border-gray-700 pb-2">
                <i class="fas fa-bug mr-3 accent-color"></i>Debug Information
            </h2>
            
            <div id="debug-info" class="space-y-4">
                <div class="text-gray-400">Loading debug information...</div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="border-t-2 border-gray-800 p-8 mt-16">
        <div class="container mx-auto text-center">
            <h3 class="font-anton text-3xl leading-tight text-white mb-4">BE SEEN,<br>BE HEARD.</h3>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            console.log('Test admin button page loaded');
            
            const rebuildBtn = document.getElementById('rebuild-events-btn');
            const rebuildStatus = document.getElementById('rebuild-events-status');
            const testResults = document.getElementById('test-results');
            const debugInfo = document.getElementById('debug-info');
            
            // Debug information
            function updateDebugInfo() {
                debugInfo.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="bg-gray-800/50 p-4 rounded-lg">
                            <h3 class="text-white font-bold mb-2">Button Status</h3>
                            <p class="text-gray-400">Found: ${!!rebuildBtn}</p>
                            <p class="text-gray-400">Disabled: ${rebuildBtn?.disabled || false}</p>
                            <p class="text-gray-400">Status Visible: ${!rebuildStatus?.classList.contains('hidden')}</p>
                        </div>
                        <div class="bg-gray-800/50 p-4 rounded-lg">
                            <h3 class="text-white font-bold mb-2">Page Info</h3>
                            <p class="text-gray-400">URL: ${window.location.href}</p>
                            <p class="text-gray-400">User Agent: ${navigator.userAgent.substring(0, 50)}...</p>
                        </div>
                    </div>
                `;
            }
            
            // Setup rebuild events functionality (copied from admin dashboard)
            function setupRebuildEvents() {
                console.log('Setting up rebuild events functionality...');
                
                console.log('Rebuild events button found:', !!rebuildBtn);
                console.log('Rebuild events status found:', !!rebuildStatus);
                
                // Load last rebuild time from localStorage
                const lastRebuildInfo = document.getElementById('last-rebuild-events-info');
                const lastRebuildTime = document.getElementById('last-rebuild-events-time');
                if (lastRebuildInfo && lastRebuildTime) {
                    const lastRebuild = localStorage.getItem('lastEventRebuild');
                    if (lastRebuild) {
                        try {
                            const rebuildData = JSON.parse(lastRebuild);
                            const rebuildDate = new Date(rebuildData.timestamp);
                            lastRebuildTime.textContent = `Last: ${rebuildDate.toLocaleString()}`;
                            lastRebuildInfo.classList.remove('hidden');
                        } catch (error) {
                            console.warn('Error parsing last event rebuild data:', error);
                        }
                    }
                }
                
                if (rebuildBtn) {
                    console.log('Adding click listener to rebuild events button...');
                    rebuildBtn.addEventListener('click', async () => {
                        try {
                            console.log('Rebuild events button clicked!');
                            if (rebuildBtn.disabled) {
                                console.log('Button is disabled, returning');
                                return;
                            }
                        
                        // Show confirmation dialog
                        console.log('Showing confirmation dialog...');
                        const confirmed = confirm('Are you sure you want to rebuild all event pages? This will regenerate all static event files with the latest data from the database.');
                        console.log('Confirmation result:', confirmed);
                        
                        if (!confirmed) {
                            console.log('User cancelled rebuild');
                            testResults.innerHTML = `
                                <div class="bg-yellow-800/20 border border-yellow-500 p-4 rounded-lg">
                                    <h3 class="text-yellow-400 font-bold mb-2">Rebuild Cancelled</h3>
                                    <p class="text-white">User cancelled the rebuild operation</p>
                                </div>
                            `;
                            return;
                        }
                        
                        console.log('User confirmed rebuild, starting process...');
                        
                        try {
                            // Show loading state
                            rebuildBtn.disabled = true;
                            rebuildStatus.classList.remove('hidden');
                            rebuildBtn.querySelector('.fa-calendar-alt').classList.add('animate-spin');
                            
                            testResults.innerHTML = `
                                <div class="bg-blue-800/20 border border-blue-500 p-4 rounded-lg">
                                    <h3 class="text-blue-400 font-bold mb-2">Starting Rebuild</h3>
                                    <p class="text-white">Starting event rebuild process...</p>
                                </div>
                            `;
                            
                            // Call the rebuild function
                            console.log('Calling rebuild events function...');
                            const response = await fetch('/.netlify/functions/build-events-ssg', {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json'
                                },
                                body: JSON.stringify({ 
                                    action: 'rebuild',
                                    source: 'test-page'
                                })
                            });
                            
                            console.log('Rebuild events response status:', response.status);
                            
                            if (!response.ok) {
                                throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                            }
                            
                            const result = await response.json();
                            console.log('Rebuild events result:', result);
                            
                            if (result.success) {
                                const isWarning = result.firebaseStatus === 'not_initialized';
                                const statusClass = isWarning ? 'bg-yellow-800/20 border-yellow-500' : 'bg-green-800/20 border-green-500';
                                const statusColor = isWarning ? 'text-yellow-400' : 'text-green-400';
                                const statusIcon = isWarning ? 'fa-exclamation-triangle' : 'fa-check-circle';
                                
                                testResults.innerHTML = `
                                    <div class="${statusClass} border p-4 rounded-lg">
                                        <h3 class="${statusColor} font-bold mb-2">
                                            <i class="fas ${statusIcon} mr-2"></i>
                                            ${isWarning ? 'Rebuild Completed (Firebase Not Configured)' : 'Rebuild Successful'}
                                        </h3>
                                        <p class="text-white">Generated ${result.generatedFiles || 0} event pages</p>
                                        <div class="mt-3 space-y-1 text-sm">
                                            <p class="text-gray-400">Environment: ${result.environment || 'unknown'}</p>
                                            <p class="text-gray-400">Firebase Status: ${result.firebaseStatus || 'unknown'}</p>
                                            <p class="text-gray-400">Has Events: ${result.hasEvents ? 'Yes' : 'No'}</p>
                                            ${result.firebaseVars ? `
                                                <div class="mt-2">
                                                    <p class="text-gray-400 font-semibold">Firebase Variables:</p>
                                                    <ul class="text-gray-400 ml-4">
                                                        <li>FIREBASE_PROJECT_ID: ${result.firebaseVars.FIREBASE_PROJECT_ID}</li>
                                                        <li>FIREBASE_CLIENT_EMAIL: ${result.firebaseVars.FIREBASE_CLIENT_EMAIL}</li>
                                                        <li>FIREBASE_PRIVATE_KEY: ${result.firebaseVars.FIREBASE_PRIVATE_KEY}</li>
                                                    </ul>
                                                </div>
                                            ` : ''}
                                        </div>
                                        ${result.output ? `<p class="text-gray-400 text-xs mt-2">Output: ${result.output}</p>` : ''}
                                    </div>
                                `;
                                
                                // Update last rebuild time
                                const lastRebuildInfo = document.getElementById('last-rebuild-events-info');
                                const lastRebuildTime = document.getElementById('last-rebuild-events-time');
                                if (lastRebuildInfo && lastRebuildTime) {
                                    const now = new Date();
                                    lastRebuildTime.textContent = `Last: ${now.toLocaleString()}`;
                                    lastRebuildInfo.classList.remove('hidden');
                                }
                                
                                // Store rebuild info in localStorage
                                localStorage.setItem('lastEventRebuild', JSON.stringify({
                                    timestamp: new Date().toISOString(),
                                    filesGenerated: result.generatedFiles || 0,
                                    source: result.source || 'test-page'
                                }));
                                
                            } else {
                                throw new Error(result.error || 'Unknown error occurred');
                            }
                            
                        } catch (error) {
                            console.error('Error rebuilding events:', error);
                            testResults.innerHTML = `
                                <div class="bg-red-800/20 border border-red-500 p-4 rounded-lg">
                                    <h3 class="text-red-400 font-bold mb-2">Rebuild Failed</h3>
                                    <p class="text-white">Failed to rebuild events: ${error.message}</p>
                                </div>
                            `;
                        } finally {
                            // Reset button state
                            rebuildBtn.disabled = false;
                            rebuildStatus.classList.add('hidden');
                            rebuildBtn.querySelector('.fa-calendar-alt').classList.remove('animate-spin');
                        }
                    } catch (error) {
                        console.error('Unexpected error in rebuild events button click handler:', error);
                        testResults.innerHTML = `
                            <div class="bg-red-800/20 border border-red-500 p-4 rounded-lg">
                                <h3 class="text-red-400 font-bold mb-2">Unexpected Error</h3>
                                <p class="text-white">Unexpected error: ${error.message}</p>
                            </div>
                        `;
                    }
                    });
                } else {
                    console.error('Rebuild events button not found!');
                    testResults.innerHTML = `
                        <div class="bg-red-800/20 border border-red-500 p-4 rounded-lg">
                            <h3 class="text-red-400 font-bold mb-2">Button Not Found</h3>
                            <p class="text-white">The rebuild events button was not found in the DOM</p>
                        </div>
                    `;
                }
            }
            
            // Initialize
            setupRebuildEvents();
            updateDebugInfo();
            
            // Update debug info every 5 seconds
            setInterval(updateDebugInfo, 5000);
        });
    </script>
</body>
</html>
