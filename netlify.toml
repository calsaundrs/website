# Scheduled Functions
[functions."scheduled-health-check"]
  schedule = "0 */15 * * *"  # Every 15 minutes

[functions."scheduled-event-reminders"]
  schedule = "0 9 * * *"  # Daily at 9 AM UTC

[functions."get-venue-details"]
  timeout = 30

[functions."get-event-details"]
  timeout = 30

[functions."venue-ssg-fallback"]
  timeout = 30

[functions."get-event-details-dynamic"]
  timeout = 30

[functions."get-events"]
  timeout = 30

