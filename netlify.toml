# This is the main configuration file for your Netlify site.

# Specifies build settings for Netlify
[build]
  # Directory that contains the deploy-ready HTML files and assets.
  publish = "."
  functions = "netlify/functions"
  command = "npm run build"

# Specifies how serverless functions are handled
[functions]
  # Main directory for all serverless functions
  directory = "netlify/functions/"
  node_bundler = "esbuild"


# --- Page Redirect and Rewrite Rules ---

# Rule for individual EVENT pages (Test redirect)
[[redirects]]
  from = "/event/*"
  to = "/.netlify/functions/test-redirect"
  status = 200
  force = true
  query = {slug = ":splat"}

# Rule for individual VENUE pages (Static SSG-based)
[[redirects]]
  from = "/venue/*"
  to = "/venue/:splat.html"
  status = 200

# Rule for the SSG build page
[[redirects]]
  from = "/build"
  to = "/run-ssg-build.html"
  status = 200

# Rule for the debug venues page
[[redirects]]
  from = "/debug-venues"
  to = "/debug-venues.html"
  status = 200

# Rule for the test venues page
[[redirects]]
  from = "/test-venues"
  to = "/test-venues.html"
  status = 200

# Rule for the test rebuild page
[[redirects]]
  from = "/test-rebuild"
  to = "/test-rebuild.html"
  status = 200

# Rule for the data migration test page
[[redirects]]
  from = "/test-data-migration"
  to = "/test-data-migration.html"
  status = 200

[[redirects]]
  from = "/user-persona-testing"
  to = "/user-persona-testing.html"
  status = 200

# Rule for the main EVENTS listing page
[[redirects]]
  from = "/events"
  to = "/events.html"
  status = 200

# Rule for the main VENUES listing page
[[redirects]]
  from = "/all-venues"
  to = "/all-venues.html"
  status = 200

# Rule for the COMMUNITY page
[[redirects]]
  from = "/community"
  to = "/community.html"
  status = 200

# Rule for the CONTACT page
[[redirects]]
  from = "/contact"
  to = "/contact.html"
  status = 200

# Rule for the GET LISTED form page
[[redirects]]
  from = "/get-listed"
  to = "/get-listed.html"
  status = 200
  
# Rule for the Public Promoter Tools Page
[[redirects]]
    from = "/promoter-tool"
    to = "/promoter-tool.html"
    status = 200

# --- Admin Section Rules ---

# Directs users to the login page
[[redirects]]
    from = "/admin"
    to = "/admin-dashboard.html"
    status = 200
    
[[redirects]]
    from = "/admin/login"
    to = "/admin-login.html"
    status = 200
    
# Rule for the hidden admin settings page
[[redirects]]
    from = "/admin/settings"
    to = "/admin-settings.html"
    status = 200

# Rule for the Pending Approvals page
[[redirects]]
    from = "/admin/approvals"
    to = "/admin-approvals.html"
    status = 200

# Rule for the Add Venue admin tool
[[redirects]]
    from = "/admin/add-venue"
    to = "/admin-add-venue.html"
    status = 200

# Rule for the Edit Approved Events admin tool
[[redirects]]
    from = "/admin/edit-events"
    to = "/admin-edit-events.html"
    status = 200

# Rule for the dynamic sitemap (Firestore-based)
[[redirects]]
  from = "/sitemap.xml"
  to = "/.netlify/functions/sitemap-firestore"
  status = 200
  force = true

# Custom 404 page
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/404-handler"
  status = 404

# Scheduled Functions
[functions."scheduled-health-check"]
  schedule = "0 */15 * * *"  # Every 15 minutes

# Environment Variables (add these to your Netlify dashboard)
[context.production.environment]
  AIRTABLE_PERSONAL_ACCESS_TOKEN = ""
  AIRTABLE_BASE_ID = ""
  CLOUDINARY_CLOUD_NAME = ""
  CLOUDINARY_API_KEY = ""
  CLOUDINARY_API_SECRET = ""
  FIREBASE_PROJECT_ID = ""
  FIREBASE_CLIENT_EMAIL = ""
  FIREBASE_PRIVATE_KEY = ""

[context.deploy-preview.environment]
