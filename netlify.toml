# This is the main configuration file for your Netlify site.

# Specifies build settings for Netlify
[build]
  # Directory that contains the deploy-ready HTML files and assets.
  publish = "."
  functions = "netlify/functions"
  command = "npm run build:css && node fix-pride-page.js && node generate-series-pages.js && npm run generate-sitemap"
  # Specify Node.js version to match package requirements
  environment = { NODE_VERSION = "20", NETLIFY_BUILD_TIMEOUT = "1800", NETLIFY_FUNCTION_TIMEOUT = "30" }

# Specifies how serverless functions are handled
[functions]
  # Main directory for all serverless functions
  directory = "netlify/functions/"
  node_bundler = "nft"
  external_node_modules = [
    "@remotion/compositor-win32-x64-msvc",
    "@remotion/compositor-darwin-x64", 
    "@remotion/compositor-linux-x64-musl",
    "@remotion/compositor-linux-x64-gnu",
    "@remotion/compositor-linux-arm64-musl",
    "@remotion/compositor-linux-arm64-gnu",
    "@remotion/bundler",
    "@remotion/cli",
    "@remotion/player",
    "@remotion/renderer",
    "@swc/core",
    "esbuild",
    "source-map",
    "@react-email/render",
    "react",
    "react-dom",
    "sharp",
    "canvas",
    "firebase-admin",
    "firebase",
    "resend",
    "cloudinary",
    "formidable",
    "lambda-multipart-parser",
    "node-fetch",
    "parse-multipart",
    "uuid",
    "xlsx",
    "handlebars",
    "cheerio"
  ]


# --- Page Redirect and Rewrite Rules ---

# --- Host-based redirects (must come before path redirects) ---

# Redirect the staging alias to production to kill the duplicate-content
# leak Google was indexing under new.brumoutloud.co.uk.
[[redirects]]
  from = "https://new.brumoutloud.co.uk/*"
  to = "https://www.brumoutloud.co.uk/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/promoter-submit"
  to = "/promoter-submit-new"
  status = 301
  force = true

[[redirects]]
  from = "/promoter-submit.html"
  to = "/promoter-submit-new"
  status = 301
  force = true

[[redirects]]
  from = "/promoter-submit/"
  to = "/promoter-submit-new"
  status = 301
  force = true

[[redirects]]
  from = "/promoter-submit-new"
  to = "/promoter-submit-new.html"
  status = 200

# Rule for individual EVENT pages (Firestore-based)
[[redirects]]
  from = "/event/*"
  to = "/.netlify/functions/get-event-details?slug=:splat"
  status = 200
  force = true

# Rule for individual VENUE pages (Firestore-based with Google Places)
# Note: Static files in /venue/ directory will be served first
[[redirects]]
  from = "/venue/*"
  to = "/.netlify/functions/get-venue-details?slug=:splat"
  status = 200
  force = false

# Proxy for Google Places photo media so the API key stays server-side.
# See netlify/functions/places-photo.js.
[[redirects]]
  from = "/api/places-photo"
  to = "/.netlify/functions/places-photo"
  status = 200
  force = true

