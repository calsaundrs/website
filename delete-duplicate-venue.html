<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Duplicate Venue</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-8">
    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-bold mb-4">Delete Duplicate Venue</h1>
        <p class="mb-4">This will delete the duplicate "The Hub" venue with placeholder image.</p>
        <button id="deleteBtn" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded">
            Delete Duplicate Venue
        </button>
        <div id="result" class="mt-4"></div>
    </div>

    <script>
        document.getElementById('deleteBtn').addEventListener('click', async () => {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Deleting...';
            
            try {
                const response = await fetch('/.netlify/functions/delete-venue', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        venueId: 'tbH1c6xg1PX3Dgm6ru9X'
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    resultDiv.innerHTML = '<p class="text-green-400">✅ Duplicate venue deleted successfully!</p>';
                } else {
                    resultDiv.innerHTML = `<p class="text-red-400">❌ Error: ${result.message}</p>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<p class="text-red-400">❌ Error: ${error.message}</p>`;
            }
        });
    </script>
</body>
</html>
