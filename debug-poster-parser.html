<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Poster Parser</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background: #1a1a1a; 
            color: white; 
            padding: 20px; 
        }
        .container { max-width: 600px; margin: 0 auto; }
        .upload-area { 
            border: 2px dashed #666; 
            padding: 20px; 
            text-align: center; 
            margin: 20px 0; 
            border-radius: 8px;
        }
        .result { 
            background: #333; 
            padding: 15px; 
            border-radius: 8px; 
            margin-top: 20px; 
            white-space: pre-wrap; 
            font-family: monospace;
        }
        button { 
            background: #007bff; 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 4px; 
            cursor: pointer; 
        }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Debug Poster Parser</h1>
        
        <div class="upload-area" id="upload-area">
            <p>Drop an image here or click to select</p>
            <input type="file" id="file-input" accept="image/*" style="display: none;">
        </div>
        
        <button id="test-btn" style="display: none;">Test Poster Analysis</button>
        
        <div id="result" class="result" style="display: none;"></div>
    </div>

    <script>
        const uploadArea = document.getElementById('upload-area');
        const fileInput = document.getElementById('file-input');
        const testBtn = document.getElementById('test-btn');
        const result = document.getElementById('result');
        
        let selectedFile = null;
        
        // Handle file selection
        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#007bff';
        });
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.style.borderColor = '#666';
        });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#666';
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFileSelect(files[0]);
            }
        });
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFileSelect(e.target.files[0]);
            }
        });
        
        function handleFileSelect(file) {
            selectedFile = file;
            uploadArea.innerHTML = `<p>Selected: ${file.name}</p>`;
            testBtn.style.display = 'block';
        }
        
        testBtn.addEventListener('click', async () => {
            if (!selectedFile) return;
            
            result.style.display = 'block';
            result.textContent = 'Testing...';
            
            try {
                // Convert to base64
                const base64 = await fileToBase64(selectedFile);
                console.log('File size:', selectedFile.size, 'bytes');
                console.log('Base64 length:', base64.length);
                
                // Test the function
                const response = await fetch('/.netlify/functions/analyze-poster', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: base64 })
                });
                
                console.log('Response status:', response.status);
                
                const responseText = await response.text();
                console.log('Response text:', responseText);
                
                let parsedResult;
                try {
                    parsedResult = JSON.parse(responseText);
                } catch (e) {
                    parsedResult = { error: 'Invalid JSON', raw: responseText };
                }
                
                result.textContent = JSON.stringify({
                    status: response.status,
                    statusText: response.statusText,
                    result: parsedResult
                }, null, 2);
                
            } catch (error) {
                console.error('Error:', error);
                result.textContent = `Error: ${error.message}`;
            }
        });
        
        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }
    </script>
</body>
</html>
