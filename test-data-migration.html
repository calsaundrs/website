<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Migration Test | Brum Outloud</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="/css/main.css">
    
    <style>
        .card-bg {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(75, 85, 99, 0.3);
        }
        .btn-primary {
            background: linear-gradient(135deg, #E83A99 0%, #8B5CF6 100%);
            border: 1px solid rgba(232, 58, 153, 0.3);
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #D61F69 0%, #7C3AED 100%);
            transform: translateY(-1px);
        }
        .btn-secondary {
            background: rgba(75, 85, 99, 0.3);
            border: 1px solid rgba(75, 85, 99, 0.5);
        }
        .btn-secondary:hover {
            background: rgba(75, 85, 99, 0.5);
        }
        .status-success { color: #10B981; }
        .status-error { color: #EF4444; }
        .status-warning { color: #F59E0B; }
    </style>
</head>
<body class="antialiased min-h-screen bg-gradient-to-br from-gray-900 via-gray-800 to-gray-900">
    <div class="container mx-auto px-4 py-8">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-white mb-4">Data Migration Test</h1>
            <p class="text-gray-400">Testing Airtable to Firestore data consistency</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Audit Results -->
            <div class="card-bg p-6 rounded-xl">
                <h2 class="text-2xl font-bold text-white mb-4">
                    <i class="fas fa-search mr-3 text-accent-color"></i>Migration Audit
                </h2>
                <div id="audit-results" class="space-y-4">
                    <div class="text-center">
                        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-accent-color mx-auto"></div>
                        <p class="text-gray-400 mt-2">Running audit...</p>
                    </div>
                </div>
                <button id="run-audit" class="btn-primary text-white px-4 py-2 rounded-lg mt-4">
                    <i class="fas fa-sync mr-2"></i>Run Audit
                </button>
            </div>

            <!-- Migration Actions -->
            <div class="card-bg p-6 rounded-xl">
                <h2 class="text-2xl font-bold text-white mb-4">
                    <i class="fas fa-database mr-3 text-accent-color"></i>Migration Actions
                </h2>
                <div class="space-y-4">
                    <button id="run-migration" class="btn-primary text-white px-4 py-2 rounded-lg w-full">
                        <i class="fas fa-upload mr-2"></i>Run Complete Migration
                    </button>
                    <button id="test-submission" class="btn-secondary text-white px-4 py-2 rounded-lg w-full">
                        <i class="fas fa-plus mr-2"></i>Test Event Submission
                    </button>
                    <button id="test-venue-submission" class="btn-secondary text-white px-4 py-2 rounded-lg w-full">
                        <i class="fas fa-building mr-2"></i>Test Venue Submission
                    </button>
                </div>
            </div>
        </div>

        <!-- Test Results -->
        <div class="card-bg p-6 rounded-xl mt-8">
            <h2 class="text-2xl font-bold text-white mb-4">
                <i class="fas fa-clipboard-check mr-3 text-accent-color"></i>Test Results
            </h2>
            <div id="test-results" class="space-y-4">
                <p class="text-gray-400">No tests run yet.</p>
            </div>
        </div>

        <!-- Admin Simulation -->
        <div class="card-bg p-6 rounded-xl mt-8">
            <h2 class="text-2xl font-bold text-white mb-4">
                <i class="fas fa-user-shield mr-3 text-accent-color"></i>Admin Simulation
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <h3 class="text-lg font-semibold text-white mb-3">Pending Items</h3>
                    <div id="pending-items" class="space-y-2">
                        <p class="text-gray-400">Loading pending items...</p>
                    </div>
                </div>
                <div>
                    <h3 class="text-lg font-semibold text-white mb-3">Approval Actions</h3>
                    <div class="space-y-2">
                        <button id="approve-test-event" class="btn-primary text-white px-3 py-1 rounded text-sm">
                            Approve Test Event
                        </button>
                        <button id="reject-test-event" class="btn-secondary text-white px-3 py-1 rounded text-sm">
                            Reject Test Event
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Test functions
        async function runAudit() {
            const resultsDiv = document.getElementById('audit-results');
            resultsDiv.innerHTML = '<div class="text-center"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-accent-color mx-auto"></div><p class="text-gray-400 mt-2">Running audit...</p></div>';
            
            try {
                const response = await fetch('/.netlify/functions/data-migration-audit');
                const data = await response.json();
                
                if (response.ok) {
                    displayAuditResults(data);
                } else {
                    resultsDiv.innerHTML = `<p class="status-error">Audit failed: ${data.message}</p>`;
                }
            } catch (error) {
                resultsDiv.innerHTML = `<p class="status-error">Audit error: ${error.message}</p>`;
            }
        }

        function displayAuditResults(data) {
            const resultsDiv = document.getElementById('audit-results');
            const summary = data.summary;
            
            resultsDiv.innerHTML = `
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="text-center">
                            <p class="text-2xl font-bold text-white">${summary.totalAirtableEvents}</p>
                            <p class="text-sm text-gray-400">Airtable Events</p>
                        </div>
                        <div class="text-center">
                            <p class="text-2xl font-bold text-white">${summary.totalFirestoreEvents}</p>
                            <p class="text-sm text-gray-400">Firestore Events</p>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="text-center">
                            <p class="text-2xl font-bold text-white">${summary.totalAirtableVenues}</p>
                            <p class="text-sm text-gray-400">Airtable Venues</p>
                        </div>
                        <div class="text-center">
                            <p class="text-2xl font-bold text-white">${summary.totalFirestoreVenues}</p>
                            <p class="text-sm text-gray-400">Firestore Venues</p>
                        </div>
                    </div>
                    <div class="text-center">
                        <p class="text-lg font-semibold ${summary.issuesFound > 0 ? 'status-warning' : 'status-success'}">
                            ${summary.issuesFound} Issues Found
                        </p>
                    </div>
                    ${summary.missingEvents > 0 ? `<p class="status-warning">⚠️ ${summary.missingEvents} events missing in Firestore</p>` : ''}
                    ${summary.missingVenues > 0 ? `<p class="status-warning">⚠️ ${summary.missingVenues} venues missing in Firestore</p>` : ''}
                </div>
            `;
        }

        async function runMigration() {
            const resultsDiv = document.getElementById('test-results');
            resultsDiv.innerHTML = '<p class="text-gray-400">Running migration...</p>';
            
            try {
                const response = await fetch('/.netlify/functions/complete-data-migration');
                const data = await response.json();
                
                if (response.ok) {
                    resultsDiv.innerHTML = `
                        <div class="space-y-2">
                            <p class="status-success">✅ Migration completed successfully!</p>
                            <p class="text-gray-400">Events migrated: ${data.summary.eventsMigrated}</p>
                            <p class="text-gray-400">Venues migrated: ${data.summary.venuesMigrated}</p>
                            <p class="text-gray-400">Total errors: ${data.summary.totalErrors}</p>
                        </div>
                    `;
                } else {
                    resultsDiv.innerHTML = `<p class="status-error">Migration failed: ${data.message}</p>`;
                }
            } catch (error) {
                resultsDiv.innerHTML = `<p class="status-error">Migration error: ${error.message}</p>`;
            }
        }

        async function testEventSubmission() {
            const resultsDiv = document.getElementById('test-results');
            resultsDiv.innerHTML = '<p class="text-gray-400">Testing event submission...</p>';
            
            try {
                const formData = new FormData();
                formData.append('event-name', 'Test Event - Data Migration');
                formData.append('description', 'This is a test event for data migration testing');
                formData.append('date', '2024-12-25');
                formData.append('venue-name', 'Test Venue');
                formData.append('category', 'Test, Migration');
                formData.append('price', 'Free');
                formData.append('email', 'test@brumoutloud.co.uk');
                
                const response = await fetch('/.netlify/functions/unified-event-submission', {
                    method: 'POST',
                    body: formData
                });
                
                if (response.ok) {
                    resultsDiv.innerHTML = '<p class="status-success">✅ Test event submitted successfully!</p>';
                } else {
                    const errorText = await response.text();
                    resultsDiv.innerHTML = `<p class="status-error">Event submission failed: ${errorText}</p>`;
                }
            } catch (error) {
                resultsDiv.innerHTML = `<p class="status-error">Event submission error: ${error.message}</p>`;
            }
        }

        async function testVenueSubmission() {
            const resultsDiv = document.getElementById('test-results');
            resultsDiv.innerHTML = '<p class="text-gray-400">Testing venue submission...</p>';
            
            try {
                const formData = new FormData();
                formData.append('venue-name', 'Test Venue - Data Migration');
                formData.append('description', 'This is a test venue for data migration testing');
                formData.append('address', '123 Test Street, Birmingham');
                formData.append('contact-email', 'test@brumoutloud.co.uk');
                formData.append('website', 'https://testvenue.com');
                
                const response = await fetch('/.netlify/functions/unified-venue-submission', {
                    method: 'POST',
                    body: formData
                });
                
                if (response.ok) {
                    resultsDiv.innerHTML = '<p class="status-success">✅ Test venue submitted successfully!</p>';
                } else {
                    const errorText = await response.text();
                    resultsDiv.innerHTML = `<p class="status-error">Venue submission failed: ${errorText}</p>`;
                }
            } catch (error) {
                resultsDiv.innerHTML = `<p class="status-error">Venue submission error: ${error.message}</p>`;
            }
        }

        async function loadPendingItems() {
            const pendingDiv = document.getElementById('pending-items');
            
            try {
                const response = await fetch('/.netlify/functions/get-pending-items-firestore');
                const data = await response.json();
                
                if (response.ok && data.items) {
                    if (data.items.length === 0) {
                        pendingDiv.innerHTML = '<p class="text-gray-400">No pending items</p>';
                    } else {
                        pendingDiv.innerHTML = data.items.map(item => `
                            <div class="p-2 bg-gray-800 rounded">
                                <p class="text-white text-sm">${item.name}</p>
                                <p class="text-gray-400 text-xs">${item.type} - ${item.status}</p>
                            </div>
                        `).join('');
                    }
                } else {
                    pendingDiv.innerHTML = '<p class="status-error">Failed to load pending items</p>';
                }
            } catch (error) {
                pendingDiv.innerHTML = `<p class="status-error">Error: ${error.message}</p>`;
            }
        }

        // Event listeners
        document.getElementById('run-audit').addEventListener('click', runAudit);
        document.getElementById('run-migration').addEventListener('click', runMigration);
        document.getElementById('test-submission').addEventListener('click', testEventSubmission);
        document.getElementById('test-venue-submission').addEventListener('click', testVenueSubmission);

        // Initialize
        runAudit();
        loadPendingItems();
    </script>
</body>
</html>
