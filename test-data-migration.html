<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Migration Test | Brum Outloud</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="/css/main.css">
    
    <style>
        .card-bg {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(75, 85, 99, 0.3);
        }
        .btn-primary {
            background: linear-gradient(135deg, #E83A99 0%, #8B5CF6 100%);
            border: 1px solid rgba(232, 58, 153, 0.3);
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #D61F69 0%, #7C3AED 100%);
            transform: translateY(-1px);
        }
        .btn-secondary {
            background: rgba(75, 85, 99, 0.3);
            border: 1px solid rgba(75, 85, 99, 0.5);
        }
        .btn-secondary:hover {
            background: rgba(75, 85, 99, 0.5);
        }
        .status-success { color: #10B981; }
        .status-error { color: #EF4444; }
        .status-warning { color: #F59E0B; }
    </style>
</head>
<body class="antialiased min-h-screen bg-gradient-to-br from-gray-900 via-gray-800 to-gray-900">
    <div class="container mx-auto px-4 py-8">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-white mb-4">Data Migration Test</h1>
            <p class="text-gray-400">Testing Airtable to Firestore data consistency</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Audit Results -->
            <div class="card-bg p-6 rounded-xl">
                <h2 class="text-2xl font-bold text-white mb-4">
                    <i class="fas fa-search mr-3 text-accent-color"></i>Migration Audit
                </h2>
                <div id="audit-results" class="space-y-4">
                    <div class="text-center">
                        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-accent-color mx-auto"></div>
                        <p class="text-gray-400 mt-2">Running audit...</p>
                    </div>
                </div>
                <div class="flex space-x-2 mt-4">
                    <button id="test-env" class="btn-secondary text-white px-4 py-2 rounded-lg">
                        <i class="fas fa-cog mr-2"></i>Test Environment
                    </button>
                    <button id="run-diagnostic" class="btn-secondary text-white px-4 py-2 rounded-lg">
                        <i class="fas fa-stethoscope mr-2"></i>Run Diagnostic
                    </button>
                    <button id="run-field-audit" class="btn-secondary text-white px-4 py-2 rounded-lg">
                        <i class="fas fa-list mr-2"></i>Field Audit
                    </button>
                    <button id="check-categories" class="btn-secondary text-white px-4 py-2 rounded-lg">
                        <i class="fas fa-tags mr-2"></i>Check Categories
                    </button>
                    <button id="run-audit" class="btn-primary text-white px-4 py-2 rounded-lg">
                        <i class="fas fa-sync mr-2"></i>Run Audit
                    </button>
                </div>
            </div>

            <!-- Migration Actions -->
            <div class="card-bg p-6 rounded-xl">
                <h2 class="text-2xl font-bold text-white mb-4">
                    <i class="fas fa-database mr-3 text-accent-color"></i>Migration Actions
                </h2>
                <div class="space-y-4">
                    <button id="run-migration" class="btn-primary text-white px-4 py-2 rounded-lg w-full">
                        <i class="fas fa-upload mr-2"></i>Run Complete Migration
                    </button>
                    <button id="test-submission" class="btn-secondary text-white px-4 py-2 rounded-lg w-full">
                        <i class="fas fa-plus mr-2"></i>Test Event Submission
                    </button>
                    <button id="test-minimal-submission" class="btn-secondary text-white px-4 py-2 rounded-lg w-full">
                        <i class="fas fa-calendar mr-2"></i>Test Minimal Submission
                    </button>
                    <button id="test-enhanced-submission" class="btn-secondary text-white px-4 py-2 rounded-lg w-full">
                        <i class="fas fa-calendar-plus mr-2"></i>Test Enhanced Submission
                    </button>
                    <button id="test-comprehensive-submission" class="btn-secondary text-white px-4 py-2 rounded-lg w-full">
                        <i class="fas fa-star mr-2"></i>Test Comprehensive Submission
                    </button>
                    <button id="test-admin-workflow" class="btn-secondary text-white px-4 py-2 rounded-lg w-full">
                        <i class="fas fa-user-shield mr-2"></i>Test Admin Workflow
                    </button>
                    <button id="test-venue-submission" class="btn-secondary text-white px-4 py-2 rounded-lg w-full">
                        <i class="fas fa-building mr-2"></i>Test Venue Submission
                    </button>
                    <button id="test-fixed-venue-submission" class="btn-secondary text-white px-4 py-2 rounded-lg w-full">
                        <i class="fas fa-wrench mr-2"></i>Test Fixed Venue Submission
                    </button>
                    <button id="test-minimal-venue-submission" class="btn-secondary text-white px-4 py-2 rounded-lg w-full">
                        <i class="fas fa-minus-circle mr-2"></i>Test Minimal Venue Submission
                    </button>
                    <button id="create-test-data" class="btn-secondary text-white px-4 py-2 rounded-lg w-full">
                        <i class="fas fa-plus-circle mr-2"></i>Create Test Data
                    </button>
                </div>
            </div>
        </div>

        <!-- Test Results -->
        <div class="card-bg p-6 rounded-xl mt-8">
            <h2 class="text-2xl font-bold text-white mb-4">
                <i class="fas fa-clipboard-check mr-3 text-accent-color"></i>Test Results
            </h2>
            <div id="test-results" class="space-y-4">
                <p class="text-gray-400">No tests run yet.</p>
            </div>
        </div>

        <!-- Admin Simulation -->
        <div class="card-bg p-6 rounded-xl mt-8">
            <h2 class="text-2xl font-bold text-white mb-4">
                <i class="fas fa-user-shield mr-3 text-accent-color"></i>Admin Simulation
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <h3 class="text-lg font-semibold text-white mb-3">Pending Items</h3>
                    <div id="pending-items" class="space-y-2">
                        <p class="text-gray-400">Loading pending items...</p>
                    </div>
                </div>
                <div>
                    <h3 class="text-lg font-semibold text-white mb-3">Approval Actions</h3>
                    <div class="space-y-2">
                        <button id="approve-test-event" class="btn-primary text-white px-3 py-1 rounded text-sm">
                            Approve Test Event
                        </button>
                        <button id="reject-test-event" class="btn-secondary text-white px-3 py-1 rounded text-sm">
                            Reject Test Event
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Test functions
        async function testEnvironment() {
            const resultsDiv = document.getElementById('audit-results');
            resultsDiv.innerHTML = '<div class="text-center"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-accent-color mx-auto"></div><p class="text-gray-400 mt-2">Testing environment...</p></div>';
            
            try {
                const response = await fetch('/.netlify/functions/test-environment');
                const data = await response.json();
                
                if (response.ok) {
                    displayEnvironmentResults(data);
                } else {
                    resultsDiv.innerHTML = `<p class="status-error">Environment test failed: ${data.message}</p>`;
                }
            } catch (error) {
                resultsDiv.innerHTML = `<p class="status-error">Environment test error: ${error.message}</p>`;
            }
        }

        async function runDiagnostic() {
            const resultsDiv = document.getElementById('audit-results');
            resultsDiv.innerHTML = '<div class="text-center"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-accent-color mx-auto"></div><p class="text-gray-400 mt-2">Running diagnostic...</p></div>';
            
            try {
                const response = await fetch('/.netlify/functions/diagnostic-check');
                const data = await response.json();
                
                if (response.ok) {
                    displayDiagnosticResults(data);
                } else {
                    resultsDiv.innerHTML = `<p class="status-error">Diagnostic failed: ${data.message}</p>`;
                }
            } catch (error) {
                resultsDiv.innerHTML = `<p class="status-error">Diagnostic error: ${error.message}</p>`;
            }
        }

        async function runFieldAudit() {
            const resultsDiv = document.getElementById('audit-results');
            resultsDiv.innerHTML = '<div class="text-center"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-accent-color mx-auto"></div><p class="text-gray-400 mt-2">Running field audit...</p></div>';
            
            try {
                const response = await fetch('/.netlify/functions/field-audit');
                const data = await response.json();
                
                if (response.ok) {
                    displayFieldAuditResults(data);
                } else {
                    resultsDiv.innerHTML = `<p class="status-error">Field audit failed: ${data.message}</p>`;
                }
            } catch (error) {
                resultsDiv.innerHTML = `<p class="status-error">Field audit error: ${error.message}</p>`;
            }
        }

        async function checkCategories() {
            const resultsDiv = document.getElementById('audit-results');
            resultsDiv.innerHTML = '<div class="text-center"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-accent-color mx-auto"></div><p class="text-gray-400 mt-2">Checking categories...</p></div>';
            
            try {
                const response = await fetch('/.netlify/functions/check-category-options');
                const data = await response.json();
                
                if (response.ok) {
                    displayCategoryResults(data);
                } else {
                    resultsDiv.innerHTML = `<p class="status-error">Category check failed: ${data.message}</p>`;
                }
            } catch (error) {
                resultsDiv.innerHTML = `<p class="status-error">Category check error: ${error.message}</p>`;
            }
        }

        async function runAudit() {
            const resultsDiv = document.getElementById('audit-results');
            resultsDiv.innerHTML = '<div class="text-center"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-accent-color mx-auto"></div><p class="text-gray-400 mt-2">Running audit...</p></div>';
            
            try {
                const response = await fetch('/.netlify/functions/data-migration-audit');
                const data = await response.json();
                
                if (response.ok) {
                    displayAuditResults(data);
                } else {
                    resultsDiv.innerHTML = `<p class="status-error">Audit failed: ${data.message}</p>`;
                }
            } catch (error) {
                resultsDiv.innerHTML = `<p class="status-error">Audit error: ${error.message}</p>`;
            }
        }

        function displayEnvironmentResults(data) {
            const resultsDiv = document.getElementById('audit-results');
            
            resultsDiv.innerHTML = `
                <div class="space-y-4">
                    <div class="text-center">
                        <p class="text-2xl font-bold text-white">${data.present}/${data.total}</p>
                        <p class="text-sm text-gray-400">Environment Variables Set</p>
                    </div>
                    <div class="text-center">
                        <p class="text-lg font-semibold ${data.missing > 0 ? 'status-warning' : 'status-success'}">
                            ${data.missing} Missing Variables
                        </p>
                    </div>
                    ${data.missing > 0 ? `
                        <div class="bg-red-900/20 border border-red-500/30 rounded p-3">
                            <p class="text-red-400 text-sm font-semibold mb-2">Missing Variables:</p>
                            <ul class="text-red-300 text-xs space-y-1">
                                ${data.missingVars.map(v => `<li>• ${v}</li>`).join('')}
                            </ul>
                        </div>
                    ` : ''}
                    <div class="bg-green-900/20 border border-green-500/30 rounded p-3">
                        <p class="text-green-400 text-sm font-semibold mb-2">Present Variables:</p>
                        <div class="grid grid-cols-2 gap-2 text-xs">
                            ${Object.entries(data.results).filter(([k, v]) => v.present).map(([k, v]) => `
                                <div class="text-green-300">
                                    <span class="font-semibold">${k}:</span> ${v.preview}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        function displayDiagnosticResults(data) {
            const resultsDiv = document.getElementById('audit-results');
            
            let html = `
                <div class="space-y-4">
                    <div class="text-center">
                        <p class="text-2xl font-bold text-white">System Diagnostic</p>
                        <p class="text-sm text-gray-400">Detailed system health check</p>
                    </div>
            `;
            
            // Environment status
            html += `
                <div class="bg-blue-900/20 border border-blue-500/30 rounded p-3">
                    <p class="text-blue-400 text-sm font-semibold mb-2">Environment Status:</p>
                    <p class="text-blue-300 text-xs">${data.environment.status}</p>
                </div>
            `;
            
            // Firebase status
            if (data.firebase.success) {
                html += `
                    <div class="bg-green-900/20 border border-green-500/30 rounded p-3">
                        <p class="text-green-400 text-sm font-semibold mb-2">Firebase Status: ✅ Connected</p>
                    </div>
                `;
            } else {
                html += `
                    <div class="bg-red-900/20 border border-red-500/30 rounded p-3">
                        <p class="text-red-400 text-sm font-semibold mb-2">Firebase Status: ❌ Error</p>
                        <p class="text-red-300 text-xs">${data.firebase.message}</p>
                    </div>
                `;
            }
            
            // Airtable status
            if (data.airtable.success) {
                html += `
                    <div class="bg-green-900/20 border border-green-500/30 rounded p-3">
                        <p class="text-green-400 text-sm font-semibold mb-2">Airtable Status: ✅ Connected</p>
                    </div>
                `;
            } else {
                html += `
                    <div class="bg-red-900/20 border border-red-500/30 rounded p-3">
                        <p class="text-red-400 text-sm font-semibold mb-2">Airtable Status: ❌ Error</p>
                        <p class="text-red-300 text-xs">${data.airtable.message}</p>
                    </div>
                `;
            }
            
            // Data status
            if (data.data.airtable && !data.data.airtable.error) {
                html += `
                    <div class="bg-green-900/20 border border-green-500/30 rounded p-3">
                        <p class="text-green-400 text-sm font-semibold mb-2">Airtable Data:</p>
                        <p class="text-green-300 text-xs">Events: ${data.data.airtable.events.count} | Venues: ${data.data.airtable.venues.count}</p>
                        ${data.data.airtable.events.sample.length > 0 ? `
                            <p class="text-green-300 text-xs mt-1">Sample Events:</p>
                            <ul class="text-green-300 text-xs ml-2">
                                ${data.data.airtable.events.sample.map(e => `<li>• ${e.name} (${e.status})</li>`).join('')}
                            </ul>
                        ` : ''}
                    </div>
                `;
            } else if (data.data.airtable && data.data.airtable.error) {
                html += `
                    <div class="bg-red-900/20 border border-red-500/30 rounded p-3">
                        <p class="text-red-400 text-sm font-semibold mb-2">Airtable Data Error:</p>
                        <p class="text-red-300 text-xs">${data.data.airtable.error}</p>
                    </div>
                `;
            }
            
            if (data.data.firestore && !data.data.firestore.error) {
                html += `
                    <div class="bg-green-900/20 border border-green-500/30 rounded p-3">
                        <p class="text-green-400 text-sm font-semibold mb-2">Firestore Data:</p>
                        <p class="text-green-300 text-xs">Events: ${data.data.firestore.events.count} | Venues: ${data.data.firestore.venues.count}</p>
                        ${data.data.firestore.events.sample.length > 0 ? `
                            <p class="text-green-300 text-xs mt-1">Sample Events:</p>
                            <ul class="text-green-300 text-xs ml-2">
                                ${data.data.firestore.events.sample.map(e => `<li>• ${e.name} (${e.status})</li>`).join('')}
                            </ul>
                        ` : ''}
                    </div>
                `;
            } else if (data.data.firestore && data.data.firestore.error) {
                html += `
                    <div class="bg-red-900/20 border border-red-500/30 rounded p-3">
                        <p class="text-red-400 text-sm font-semibold mb-2">Firestore Data Error:</p>
                        <p class="text-red-300 text-xs">${data.data.firestore.error}</p>
                    </div>
                `;
            }
            
            html += `</div>`;
            resultsDiv.innerHTML = html;
        }

        function displayFieldAuditResults(data) {
            const resultsDiv = document.getElementById('audit-results');
            
            let html = `
                <div class="space-y-4">
                    <div class="text-center">
                        <p class="text-2xl font-bold text-white">Field Audit</p>
                        <p class="text-sm text-gray-400">Airtable Events Table Schema</p>
                    </div>
                    <div class="text-center">
                        <p class="text-lg font-semibold text-blue-400">${data.totalFields} Fields Found</p>
                        <p class="text-sm text-gray-400">Analyzed ${data.recordsAnalyzed} records</p>
                    </div>
            `;
            
            // Show raw fields for debugging
            if (data.rawFields) {
                html += `
                    <div class="bg-blue-900/20 border border-blue-500/30 rounded p-3">
                        <p class="text-blue-400 text-sm font-semibold mb-2">🔍 Raw Fields (Debug):</p>
                        <div class="text-xs text-blue-300">
                            ${Object.keys(data.rawFields).map(field => `<div>• ${field}</div>`).join('')}
                        </div>
                    </div>
                `;
            }
            
            // Group fields by accessibility
            const accessibleFields = [];
            const computedFields = [];
            
            Object.entries(data.fields).forEach(([fieldName, fieldInfo]) => {
                if (fieldInfo.accessible) {
                    accessibleFields.push({ name: fieldName, ...fieldInfo });
                } else {
                    computedFields.push({ name: fieldName, ...fieldInfo });
                }
            });
            
            // Display accessible fields
            if (accessibleFields.length > 0) {
                html += `
                    <div class="bg-green-900/20 border border-green-500/30 rounded p-3">
                        <p class="text-green-400 text-sm font-semibold mb-2">✅ Writable Fields (${accessibleFields.length}):</p>
                        <div class="grid grid-cols-2 gap-2 text-xs">
                            ${accessibleFields.map(field => `
                                <div class="text-green-300">
                                    <span class="font-semibold">${field.name}:</span> ${field.type}${field.isArray ? ' (array)' : ''}${field.stringLength ? ` (${field.stringLength} chars)` : ''}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
            
            // Display computed fields
            if (computedFields.length > 0) {
                html += `
                    <div class="bg-red-900/20 border border-red-500/30 rounded p-3">
                        <p class="text-red-400 text-sm font-semibold mb-2">❌ Computed Fields (${computedFields.length}):</p>
                        <div class="grid grid-cols-2 gap-2 text-xs">
                            ${computedFields.map(field => `
                                <div class="text-red-300">
                                    <span class="font-semibold">${field.name}:</span> ${field.error}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
            
            html += `</div>`;
            resultsDiv.innerHTML = html;
        }

        function displayCategoryResults(data) {
            const resultsDiv = document.getElementById('audit-results');
            
            let html = `
                <div class="space-y-4">
                    <div class="text-center">
                        <p class="text-2xl font-bold text-white">Category Options</p>
                        <p class="text-sm text-gray-400">Available categories in Airtable Events</p>
                    </div>
                    <div class="text-center">
                        <p class="text-lg font-semibold text-blue-400">${data.totalCategories} Categories Found</p>
                    </div>
            `;
            
            if (data.categories.length > 0) {
                html += `
                    <div class="bg-green-900/20 border border-green-500/30 rounded p-3">
                        <p class="text-green-400 text-sm font-semibold mb-2">✅ Available Categories:</p>
                        <div class="grid grid-cols-2 gap-2 text-xs">
                            ${data.categories.map(category => `
                                <div class="text-green-300">
                                    <span class="font-semibold">• ${category}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
            
            if (data.sampleEvents.length > 0) {
                html += `
                    <div class="bg-blue-900/20 border border-blue-500/30 rounded p-3">
                        <p class="text-blue-400 text-sm font-semibold mb-2">📋 Sample Events with Categories:</p>
                        <div class="text-xs space-y-1">
                            ${data.sampleEvents.map(event => `
                                <div class="text-blue-300">
                                    <span class="font-semibold">${event.name}:</span> ${event.categories ? event.categories.join(', ') : 'No categories'}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
            
            html += `</div>`;
            resultsDiv.innerHTML = html;
        }

        function displayAuditResults(data) {
            const resultsDiv = document.getElementById('audit-results');
            const summary = data.summary;
            
            resultsDiv.innerHTML = `
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="text-center">
                            <p class="text-2xl font-bold text-white">${summary.totalAirtableEvents}</p>
                            <p class="text-sm text-gray-400">Airtable Events</p>
                        </div>
                        <div class="text-center">
                            <p class="text-2xl font-bold text-white">${summary.totalFirestoreEvents}</p>
                            <p class="text-sm text-gray-400">Firestore Events</p>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="text-center">
                            <p class="text-2xl font-bold text-white">${summary.totalAirtableVenues}</p>
                            <p class="text-sm text-gray-400">Airtable Venues</p>
                        </div>
                        <div class="text-center">
                            <p class="text-2xl font-bold text-white">${summary.totalFirestoreVenues}</p>
                            <p class="text-sm text-gray-400">Firestore Venues</p>
                        </div>
                    </div>
                    <div class="text-center">
                        <p class="text-lg font-semibold ${summary.issuesFound > 0 ? 'status-warning' : 'status-success'}">
                            ${summary.issuesFound} Issues Found
                        </p>
                    </div>
                    ${summary.missingEvents > 0 ? `<p class="status-warning">⚠️ ${summary.missingEvents} events missing in Firestore</p>` : ''}
                    ${summary.missingVenues > 0 ? `<p class="status-warning">⚠️ ${summary.missingVenues} venues missing in Firestore</p>` : ''}
                </div>
            `;
        }

        async function runMigration() {
            const resultsDiv = document.getElementById('test-results');
            resultsDiv.innerHTML = '<p class="text-gray-400">Running migration...</p>';
            
            try {
                const response = await fetch('/.netlify/functions/complete-data-migration');
                
                if (!response.ok) {
                    const errorText = await response.text();
                    resultsDiv.innerHTML = `<p class="status-error">Migration failed (HTTP ${response.status}): ${errorText}</p>`;
                    return;
                }
                
                const data = await response.json();
                
                if (response.ok) {
                    resultsDiv.innerHTML = `
                        <div class="space-y-2">
                            <p class="status-success">✅ Migration completed successfully!</p>
                            <p class="text-gray-400">Events migrated: ${data.results.events.migrated}</p>
                            <p class="text-gray-400">Events skipped: ${data.results.events.skipped}</p>
                            <p class="text-gray-400">Events errors: ${data.results.events.errors}</p>
                            <p class="text-gray-400">Venues migrated: ${data.results.venues.migrated}</p>
                            <p class="text-gray-400">Venues skipped: ${data.results.venues.skipped}</p>

        async function loadPendingItems() {
            const pendingDiv = document.getElementById('pending-items');
            
            try {
                const response = await fetch('/.netlify/functions/get-pending-items-firestore');
                const data = await response.json();
                
                if (response.ok && data.items) {
                    if (data.items.length === 0) {
                        pendingDiv.innerHTML = '<p class="text-gray-400">No pending items</p>';
                    } else {
                        pendingDiv.innerHTML = data.items.map(item => `
                            <div class="p-2 bg-gray-800 rounded">
                                <p class="text-white text-sm">${item.name}</p>
                                <p class="text-gray-400 text-xs">${item.type} - ${item.status}</p>
                            </div>
                        `).join('');
                    }
                } else {
                    pendingDiv.innerHTML = '<p class="status-error">Failed to load pending items</p>';
                }
            } catch (error) {
                pendingDiv.innerHTML = `<p class="status-error">Error: ${error.message}</p>`;
            }
        }
