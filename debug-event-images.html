<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Event Images</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #1f2937; color: white; }
        .debug-section { margin: 20px 0; padding: 15px; background: #374151; border-radius: 8px; }
        .event-data { margin: 10px 0; padding: 10px; background: #4b5563; border-radius: 4px; }
        pre { white-space: pre-wrap; word-wrap: break-word; }
        button { background: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
        button:hover { background: #2563eb; }
    </style>

    <!-- FOUC Prevention: Critical CSS and Loading Screen -->
    <style>
        /* FOUC Prevention - Hide content until styles are loaded */
        .fouc-prevention {
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        
        .fouc-prevention.loaded {
            visibility: visible;
            opacity: 1;
        }
        
        /* Loading screen */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #121212 0%, #1a1a1a 50%, #2d1b69 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        
        .loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }
        
        .loading-logo {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }
        
        .loading-text {
            color: #B564F7;
            font-family: 'Poppins', sans-serif;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(181, 100, 247, 0.3);
            border-top: 3px solid #B564F7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Critical CSS to prevent flashing */
        body {
            background-color: #121212;
            color: #EAEAEA;
            font-family: 'Poppins', system-ui, -apple-system, sans-serif;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            margin: 0;
            padding: 0;
        }
        
        /* Basic layout styles to prevent layout shift */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
        }
        
        /* Prevent pride flag from flashing at full size */
        img[src*="progressflag"] {
            height: 1.5rem !important;
            width: auto !important;
            max-width: 1.5rem !important;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        /* Show flag after page loads */
        .flag-loaded img[src*="progressflag"] {
            opacity: 1;
        }
    </style>
    
    <!-- FOUC Prevention Script -->
    <script src="/js/fouc-prevention.js"></script>
    </head>
<body>
    <h1>Debug Event Images</h1>
    
    <div class="debug-section">
        <button onclick="debugEventImages()">Debug Event Images</button>
        <div id="debug-results"></div>
    </div>

    <script>
        async function debugEventImages() {
            const resultsDiv = document.getElementById('debug-results');
            resultsDiv.innerHTML = 'Loading...';
            
            try {
                const response = await fetch('/.netlify/functions/debug-event-images');
                const data = await response.json();
                
                if (data.success) {
                    let html = '<h3>Debug Results:</h3>';
                    html += '<p><strong>Cloudinary Cloud Name:</strong> ' + data.cloudinaryCloudName + '</p>';
                    html += '<p><strong>Total Events:</strong> ' + data.totalEvents + '</p>';
                    html += '<p><strong>Events with Images:</strong> ' + data.eventsWithImages + '</p>';
                    html += '<p><strong>Events without Images:</strong> ' + data.eventsWithoutImages + '</p>';
                    
                    html += '<h4>Events WITH Images:</h4>';
                    data.eventsWithImagesData.forEach((event, index) => {
                        html += '<div class="event-data" style="border-left: 4px solid #10B981;">';
                        html += '<h4>Event ' + (index + 1) + ': ' + event.name + '</h4>';
                        html += '<p><strong>ID:</strong> ' + event.id + '</p>';
                        html += '<p><strong>Image Fields:</strong></p>';
                        html += '<pre>' + JSON.stringify(event.imageFields, null, 2) + '</pre>';
                        html += '<p><strong>Cloudinary Fields:</strong></p>';
                        html += '<pre>' + JSON.stringify(event.cloudinaryFields, null, 2) + '</pre>';
                        html += '</div>';
                    });
                    
                    html += '<h4>Events WITHOUT Images:</h4>';
                    data.eventsWithoutImagesData.forEach((event, index) => {
                        html += '<div class="event-data" style="border-left: 4px solid #EF4444;">';
                        html += '<h4>Event ' + (index + 1) + ': ' + event.name + '</h4>';
                        html += '<p><strong>ID:</strong> ' + event.id + '</p>';
                        html += '<p><strong>All Keys:</strong></p>';
                        html += '<pre>' + JSON.stringify(event.allKeys, null, 2) + '</pre>';
                        html += '</div>';
                    });
                    
                    resultsDiv.innerHTML = html;
                } else {
                    resultsDiv.innerHTML = '<p style="color: red;">Error: ' + data.message + '</p>';
                }
            } catch (error) {
                resultsDiv.innerHTML = '<p style="color: red;">Error: ' + error.message + '</p>';
            }
        }
    </script>
</body>
</html>
