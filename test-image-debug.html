<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Debug Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-8">
    <h1 class="text-2xl font-bold mb-6">Image Debug Test</h1>
    
    <button onclick="testImageExtraction()" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded mb-4">
        Test Image Extraction
    </button>
    
    <button onclick="testRawData()" class="bg-green-600 hover:bg-green-700 px-4 py-2 rounded mb-4 ml-2">
        Test Raw Firestore Data
    </button>
    
    <button onclick="testCollections()" class="bg-purple-600 hover:bg-purple-700 px-4 py-2 rounded mb-4 ml-2">
        Check All Collections
    </button>
    
    <button onclick="testBearAll()" class="bg-orange-600 hover:bg-orange-700 px-4 py-2 rounded mb-4 ml-2">
        Debug Bear All Event
    </button>
    
    <button onclick="migrateEventImages()" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded mb-4 ml-2">
        Migrate Event Images (Mini - 10 events)
    </button>
    
    <button onclick="testMigrationConnection()" class="bg-yellow-600 hover:bg-yellow-700 px-4 py-2 rounded mb-4 ml-2">
        Test Migration Connections
    </button>
    
    <div id="results" class="space-y-4"></div>
    
    <script>
        async function testImageExtraction() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<p>Loading...</p>';
            
            try {
                const response = await fetch('/.netlify/functions/get-events-firestore-simple?limit=5');
                const data = await response.json();
                
                if (data.success && data.events) {
                    let html = '<h2 class="text-xl font-bold mb-4">Event Image Data:</h2>';
                    
                    data.events.forEach((event, index) => {
                        html += `
                            <div class="border border-gray-600 rounded p-4 mb-4">
                                <h3 class="font-bold text-lg mb-2">${event.name}</h3>
                                <p><strong>Event ID:</strong> ${event.id}</p>
                                <p><strong>Raw image data:</strong></p>
                                <pre class="bg-gray-800 p-2 rounded text-xs overflow-auto">${JSON.stringify(event.image, null, 2)}</pre>
                                <p><strong>Image URL used:</strong> ${event.image ? (typeof event.image === 'string' ? event.image : event.image.url) : 'NO IMAGE'}</p>
                                <p><strong>Image type:</strong> ${typeof event.image}</p>
                                ${event.image && event.image.url ? `<img src="${event.image.url}" alt="${event.name}" class="w-32 h-32 object-cover rounded mt-2">` : ''}
                            </div>
                        `;
                    });
                    
                    resultsDiv.innerHTML = html;
                } else {
                    resultsDiv.innerHTML = '<p class="text-red-400">Error: ' + JSON.stringify(data) + '</p>';
                }
            } catch (error) {
                resultsDiv.innerHTML = '<p class="text-red-400">Error: ' + error.message + '</p>';
            }
        }
        
        async function testRawData() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<p>Loading raw data...</p>';
            
            try {
                const response = await fetch('/.netlify/functions/debug-events-raw-data');
                const data = await response.json();
                
                if (data.success && data.debugData) {
                    let html = '<h2 class="text-xl font-bold mb-4">Raw Firestore Data:</h2>';
                    html += '<p><strong>Cloudinary Cloud Name:</strong> ' + data.cloudinaryCloudName + '</p>';
                    
                    data.debugData.forEach((event, index) => {
                        html += `
                            <div class="border border-gray-600 rounded p-4 mb-4">
                                <h3 class="font-bold text-lg mb-2">${event.name}</h3>
                                <p><strong>Event ID:</strong> ${event.id}</p>
                                <p><strong>All Keys:</strong></p>
                                <pre class="bg-gray-800 p-2 rounded text-xs overflow-auto">${JSON.stringify(event.allKeys, null, 2)}</pre>
                                <p><strong>Image Related Keys:</strong></p>
                                <pre class="bg-gray-800 p-2 rounded text-xs overflow-auto">${JSON.stringify(event.imageRelatedKeys, null, 2)}</pre>
                                <p><strong>Cloudinary Public ID:</strong> ${event.cloudinaryPublicId || 'NOT FOUND'}</p>
                                <p><strong>Cloudinary Public ID (camelCase):</strong> ${event.cloudinaryPublicIdCamel || 'NOT FOUND'}</p>
                                <p><strong>Promo Image:</strong></p>
                                <pre class="bg-gray-800 p-2 rounded text-xs overflow-auto">${JSON.stringify(event.promoImage, null, 2)}</pre>
                                <p><strong>Promo Image (camelCase):</strong></p>
                                <pre class="bg-gray-800 p-2 rounded text-xs overflow-auto">${JSON.stringify(event.promoImageCamel, null, 2)}</pre>
                                <p><strong>Image:</strong></p>
                                <pre class="bg-gray-800 p-2 rounded text-xs overflow-auto">${JSON.stringify(event.image, null, 2)}</pre>
                            </div>
                        `;
                    });
                    
                    resultsDiv.innerHTML = html;
                } else {
                    resultsDiv.innerHTML = '<p class="text-red-400">Error: ' + JSON.stringify(data) + '</p>';
                }
            } catch (error) {
                resultsDiv.innerHTML = '<p class="text-red-400">Error: ' + error.message + '</p>';
            }
        }
        
        async function testCollections() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<p>Loading collections...</p>';
            
            try {
                const response = await fetch('/.netlify/functions/debug-collections');
                const data = await response.json();
                
                if (data.success && data.collections) {
                    let html = '<h2 class="text-xl font-bold mb-4">Firestore Collections:</h2>';
                    html += '<p><strong>Available Collections:</strong> ' + data.collections.join(', ') + '</p>';
                    
                    Object.entries(data.collectionData).forEach(([collectionName, collectionInfo]) => {
                        html += `
                            <div class="border border-gray-600 rounded p-4 mb-4">
                                <h3 class="font-bold text-lg mb-2">Collection: ${collectionName}</h3>
                                <p><strong>Document Count:</strong> ${collectionInfo.docCount || 'Error'}</p>
                                <p><strong>Has Image Fields:</strong> ${collectionInfo.hasImageFields ? 'YES' : 'NO'}</p>
                                ${collectionInfo.error ? `<p class="text-red-400"><strong>Error:</strong> ${collectionInfo.error}</p>` : ''}
                                
                                ${collectionInfo.docs ? `
                                    <h4 class="font-bold mt-3 mb-2">Sample Documents:</h4>
                                    ${collectionInfo.docs.map((doc, index) => `
                                        <div class="border-l-4 border-gray-500 pl-3 mb-3">
                                            <p><strong>Doc ${index + 1}:</strong> ${doc.name}</p>
                                            <p><strong>ID:</strong> ${doc.id}</p>
                                            <p><strong>Has Image Fields:</strong> ${doc.hasImageFields ? 'YES' : 'NO'}</p>
                                            ${doc.hasImageFields ? `
                                                <p><strong>Image Related Keys:</strong></p>
                                                <pre class="bg-gray-800 p-2 rounded text-xs overflow-auto">${JSON.stringify(doc.imageRelatedKeys, null, 2)}</pre>
                                                <p><strong>Cloudinary Public ID:</strong> ${doc.cloudinaryPublicId || 'NOT FOUND'}</p>
                                                <p><strong>Promo Image:</strong></p>
                                                <pre class="bg-gray-800 p-2 rounded text-xs overflow-auto">${JSON.stringify(doc.promoImage, null, 2)}</pre>
                                            ` : ''}
                                            <p><strong>All Keys:</strong></p>
                                            <pre class="bg-gray-800 p-2 rounded text-xs overflow-auto">${JSON.stringify(doc.allKeys, null, 2)}</pre>
                                        </div>
                                    `).join('')}
                                ` : ''}
                            </div>
                        `;
                    });
                    
                    resultsDiv.innerHTML = html;
                } else {
                    resultsDiv.innerHTML = '<p class="text-red-400">Error: ' + JSON.stringify(data) + '</p>';
                }
            } catch (error) {
                resultsDiv.innerHTML = '<p class="text-red-400">Error: ' + error.message + '</p>';
            }
        }
        
        async function testBearAll() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<p>Loading Bear All data...</p>';
            
            try {
                const response = await fetch('/.netlify/functions/debug-bear-all-event');
                const data = await response.json();
                
                if (data.success && data.results) {
                    let html = '<h2 class="text-xl font-bold mb-4">Bear All Event Debug:</h2>';
                    html += '<p><strong>Cloudinary Cloud Name:</strong> ' + data.cloudinaryCloudName + '</p>';
                    html += '<p><strong>Available Collections:</strong> ' + data.collections.join(', ') + '</p>';
                    
                    Object.entries(data.results).forEach(([collectionName, result]) => {
                        html += `
                            <div class="border border-gray-600 rounded p-4 mb-4">
                                <h3 class="font-bold text-lg mb-2">Collection: ${collectionName}</h3>
                                <p><strong>Found Bear All:</strong> ${result.found ? 'YES' : 'NO'}</p>
                                <p><strong>Document Count:</strong> ${result.docCount || 0}</p>
                                ${result.error ? `<p class="text-red-400"><strong>Error:</strong> ${result.error}</p>` : ''}
                                
                                ${result.docs ? `
                                    <h4 class="font-bold mt-3 mb-2">Bear All Documents:</h4>
                                    ${result.docs.map((doc, index) => `
                                        <div class="border-l-4 border-orange-500 pl-3 mb-3">
                                            <p><strong>Doc ${index + 1}:</strong> ${doc.name}</p>
                                            <p><strong>ID:</strong> ${doc.id}</p>
                                            <p><strong>Slug:</strong> ${doc.slug || 'NOT FOUND'}</p>
                                            <p><strong>Has Image Fields:</strong> ${doc.hasImageFields ? 'YES' : 'NO'}</p>
                                            ${doc.hasImageFields ? `
                                                <p><strong>Image Related Keys:</strong></p>
                                                <pre class="bg-gray-800 p-2 rounded text-xs overflow-auto">${JSON.stringify(doc.imageRelatedKeys, null, 2)}</pre>
                                                <p><strong>Cloudinary Public ID:</strong> ${doc.cloudinaryPublicId || 'NOT FOUND'}</p>
                                                <p><strong>Promo Image:</strong></p>
                                                <pre class="bg-gray-800 p-2 rounded text-xs overflow-auto">${JSON.stringify(doc.promoImage, null, 2)}</pre>
                                            ` : ''}
                                            <p><strong>All Keys:</strong></p>
                                            <pre class="bg-gray-800 p-2 rounded text-xs overflow-auto">${JSON.stringify(doc.allKeys, null, 2)}</pre>
                                        </div>
                                    `).join('')}
                                ` : ''}
                            </div>
                        `;
                    });
                    
                    resultsDiv.innerHTML = html;
                } else {
                    resultsDiv.innerHTML = '<p class="text-red-400">Error: ' + JSON.stringify(data) + '</p>';
                }
            } catch (error) {
                resultsDiv.innerHTML = '<p class="text-red-400">Error: ' + error.message + '</p>';
            }
        }
        
        async function migrateEventImages() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<p>Starting mini image migration (10 events)...</p>';
            
            try {
                const response = await fetch('/.netlify/functions/migrate-event-images-mini');
                const data = await response.json();
                
                if (data.success) {
                    let html = '<h2 class="text-xl font-bold mb-4">Image Migration Results:</h2>';
                    html += '<p class="text-green-400"><strong>Success:</strong> ' + data.message + '</p>';
                    html += '<p><strong>Updated:</strong> ' + data.updated + ' events</p>';
                    html += '<p><strong>Skipped:</strong> ' + data.skipped + ' events</p>';
                    html += '<p><strong>Errors:</strong> ' + data.errors + ' events</p>';
                    
                    if (data.updated > 0) {
                        html += '<p class="text-blue-400 mt-4">Migration completed! The events listing should now show proper images.</p>';
                    }
                    
                    resultsDiv.innerHTML = html;
                } else {
                    resultsDiv.innerHTML = '<p class="text-red-400">Migration failed: ' + data.error + '</p>';
                }
            } catch (error) {
                resultsDiv.innerHTML = '<p class="text-red-400">Error: ' + error.message + '</p>';
            }
        }
        
        async function testMigrationConnection() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<p>Testing migration connections...</p>';
            
            try {
                const response = await fetch('/.netlify/functions/test-migration-connection');
                const data = await response.json();
                
                if (data.success) {
                    let html = '<h2 class="text-xl font-bold mb-4">Migration Connection Test Results:</h2>';
                    html += '<p><strong>Message:</strong> ' + data.message + '</p>';
                    html += '<p><strong>Timestamp:</strong> ' + data.timestamp + '</p>';
                    
                    html += '<h3 class="font-bold mt-4 mb-2">Airtable Test:</h3>';
                    if (data.results.airtable.success) {
                        html += '<p class="text-green-400">✅ Airtable connection successful</p>';
                        html += '<p><strong>Records found:</strong> ' + data.results.airtable.count + '</p>';
                    } else {
                        html += '<p class="text-red-400">❌ Airtable connection failed</p>';
                        html += '<p><strong>Error:</strong> ' + data.results.airtable.error + '</p>';
                    }
                    
                    html += '<h3 class="font-bold mt-4 mb-2">Firebase Test:</h3>';
                    if (data.results.firebase.success) {
                        html += '<p class="text-green-400">✅ Firebase connection successful</p>';
                        html += '<p><strong>Records found:</strong> ' + data.results.firebase.count + '</p>';
                    } else {
                        html += '<p class="text-red-400">❌ Firebase connection failed</p>';
                        html += '<p><strong>Error:</strong> ' + data.results.firebase.error + '</p>';
                    }
                    
                    resultsDiv.innerHTML = html;
                } else {
                    resultsDiv.innerHTML = '<p class="text-red-400">Connection test failed: ' + data.error + '</p>';
                }
            } catch (error) {
                resultsDiv.innerHTML = '<p class="text-red-400">Error: ' + error.message + '</p>';
            }
        }
    </script>
</body>
</html>
