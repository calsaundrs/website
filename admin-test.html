<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Performance: DNS prefetch and preconnect for external resources -->
    <link rel="preconnect" href="https://firestore.googleapis.com">
    <link rel="dns-prefetch" href="https://firestore.googleapis.com">
    <link rel="preconnect" href="https://www.googleapis.com">
    <link rel="dns-prefetch" href="https://www.googleapis.com">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Admin Test | Brum Out Loud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/main.css">

    <!-- FOUC Prevention: Critical CSS and Loading Screen -->
    <style>
        /* FOUC Prevention - Hide content until styles are loaded */
        .fouc-prevention {
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        
        .fouc-prevention.loaded {
            visibility: visible;
            opacity: 1;
        }
        
        /* Loading screen */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #121212 0%, #1a1a1a 50%, #2d1b69 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        
        .loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }
        
        .loading-logo {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }
        
        .loading-text {
            color: #B564F7;
            font-family: 'Poppins', sans-serif;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(181, 100, 247, 0.3);
            border-top: 3px solid #B564F7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Critical CSS to prevent flashing */
        body {
            background-color: #121212;
            color: #EAEAEA;
            font-family: 'Poppins', system-ui, -apple-system, sans-serif;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            margin: 0;
            padding: 0;
        }
        
        /* Basic layout styles to prevent layout shift */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
        }
        
        /* Prevent pride flag from flashing at full size */
        img[src*="progressflag"] {
            height: 1.5rem !important;
            width: auto !important;
            max-width: 1.5rem !important;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        /* Show flag after page loads */
        .flag-loaded img[src*="progressflag"] {
            opacity: 1;
        }
    </style>
    </head>
<body class="antialiased bg-gray-900 text-white">
    <div class="container mx-auto px-8 py-8">
        <h1 class="text-3xl font-bold mb-8">Admin Functions Test</h1>
        
        <div class="space-y-6">
            <div class="card-bg p-6">
                <h2 class="text-xl font-bold mb-4">Test Functions</h2>
                <div class="space-y-4">
                    <button onclick="testFunction('get-pending-items')" class="bg-blue-600 px-4 py-2 rounded">Test get-pending-items</button>
                    <button onclick="testFunction('get-pending-venues')" class="bg-blue-600 px-4 py-2 rounded">Test get-pending-venues</button>
                    <button onclick="testFunction('get-events-count')" class="bg-blue-600 px-4 py-2 rounded">Test get-events-count</button>
                    <button onclick="testFunction('get-venues-count')" class="bg-blue-600 px-4 py-2 rounded">Test get-venues-count</button>
                    <button onclick="testFunction('get-recent-activity')" class="bg-blue-600 px-4 py-2 rounded">Test get-recent-activity</button>
                    <button onclick="testFunction('get-settings')" class="bg-blue-600 px-4 py-2 rounded">Test get-settings</button>
                    <button onclick="testFunction('get-recurring-events')" class="bg-blue-600 px-4 py-2 rounded">Test get-recurring-events</button>
                    <button onclick="testFunction('debug-events')" class="bg-red-600 px-4 py-2 rounded">Debug Events (Check Status Values)</button>
                    <button onclick="testFunction('debug-venues')" class="bg-red-600 px-4 py-2 rounded">Debug Venues (Check Status Values)</button>
                    <button onclick="testFunction('add-test-pending-event')" class="bg-green-600 px-4 py-2 rounded">Add Test Pending Event</button>
                </div>
            </div>
            
            <div class="card-bg p-6">
                <h2 class="text-xl font-bold mb-4">Results</h2>
                <pre id="result" class="bg-gray-800 p-4 rounded text-sm overflow-auto max-h-96"></pre>
            </div>
        </div>
    </div>

    <script>
        async function testFunction(functionName) {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<div class="text-blue-400">Testing ' + functionName + '...</div>';
            
            try {
                let response;
                if (functionName === 'add-test-pending-event') {
                    response = await fetch('/.netlify/functions/' + functionName, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        }
                    });
                } else {
                    response = await fetch('/.netlify/functions/' + functionName);
                }
                
                const data = await response.json();
                
                resultDiv.innerHTML = `
                    <div class="mb-4">
                        <h3 class="text-lg font-bold text-white mb-2">${functionName} Response:</h3>
                        <div class="text-green-400 mb-2">Status: ${response.status}</div>
                        <pre class="bg-gray-800 p-4 rounded text-sm overflow-auto max-h-96">${JSON.stringify(data, null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="mb-4">
                        <h3 class="text-lg font-bold text-white mb-2">${functionName} Error:</h3>
                        <div class="text-red-400">${error.message}</div>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
