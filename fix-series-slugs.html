<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fix Series Slugs</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background-color: #1a1a1a;
            color: #ffffff;
        }
        .container {
            background-color: #2a2a2a;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        h1 {
            color: #ff6b6b;
            text-align: center;
            margin-bottom: 30px;
        }
        .warning {
            background-color: #ff6b6b20;
            border: 1px solid #ff6b6b;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }
        .warning h3 {
            color: #ff6b6b;
            margin-top: 0;
        }
        .button {
            background-color: #ff6b6b;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 20px;
        }
        .button:hover {
            background-color: #ff5252;
        }
        .button:disabled {
            background-color: #666;
            cursor: not-allowed;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        .status.success {
            background-color: #4ecdc420;
            border: 1px solid #4ecdc4;
            color: #4ecdc4;
        }
        .status.error {
            background-color: #ff6b6b20;
            border: 1px solid #ff6b6b;
            color: #ff6b6b;
        }
        .status.loading {
            background-color: #ffd93d20;
            border: 1px solid #ffd93d;
            color: #ffd93d;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Fix Series Slugs</h1>
        
        <div class="warning">
            <h3>⚠️ Important Warning</h3>
            <p>This will fix the slugs for series events so that each instance has a unique slug. This is necessary because currently all instances of "Mash Up Mondays" have the same slug, which causes routing issues.</p>
        </div>

        <button id="testBtn" class="button" onclick="fixSlugs(true)" style="background-color: #4ecdc4; color: #333;">
            🧪 Test Fix (Dry Run)
        </button>
        
        <button id="fixBtn" class="button" onclick="fixSlugs(false)">
            🚀 Apply Fix
        </button>

        <div id="status" class="status"></div>
    </div>

    <script>
        async function fixSlugs(isDryRun = false) {
            const testBtn = document.getElementById('testBtn');
            const fixBtn = document.getElementById('fixBtn');
            const status = document.getElementById('status');
            
            // Disable buttons
            testBtn.disabled = true;
            fixBtn.disabled = true;
            
            if (isDryRun) {
                testBtn.textContent = '🔄 Testing...';
            } else {
                fixBtn.textContent = '🔄 Fixing...';
            }
            
            status.style.display = 'block';
            status.className = 'status loading';
            status.textContent = `${isDryRun ? 'Testing' : 'Applying'} series slug fix...`;
            
            try {
                const response = await fetch(`/.netlify/functions/fix-series-slugs?dryRun=${isDryRun}`);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const result = await response.json();
                
                status.className = 'status success';
                status.innerHTML = `
                    <h3>✅ ${isDryRun ? 'Test' : 'Fix'} Completed Successfully!</h3>
                    <p><strong>Message:</strong> ${result.message}</p>
                    <p><strong>Processed:</strong> ${result.processed} events</p>
                    <p><strong>Errors:</strong> ${result.errors}</p>
                    <p><strong>Updates:</strong> ${result.updates}</p>
                    ${isDryRun ? '<p><em>This was a dry run - no data was actually changed.</em></p>' : ''}
                `;
                
                if (isDryRun) {
                    testBtn.textContent = '✅ Test Complete';
                } else {
                    fixBtn.textContent = '✅ Fix Complete';
                }
                
            } catch (error) {
                console.error('Fix failed:', error);
                
                status.className = 'status error';
                status.innerHTML = `
                    <h3>❌ ${isDryRun ? 'Test' : 'Fix'} Failed</h3>
                    <p>Error: ${error.message}</p>
                `;
                
                if (isDryRun) {
                    testBtn.textContent = '❌ Test Failed - Try Again';
                    testBtn.disabled = false;
                } else {
                    fixBtn.textContent = '❌ Fix Failed - Try Again';
                    fixBtn.disabled = false;
                }
            }
        }
    </script>
</body>
</html>
