<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Performance: DNS prefetch and preconnect for external resources -->
    <link rel="preconnect" href="https://firestore.googleapis.com">
    <link rel="dns-prefetch" href="https://firestore.googleapis.com">
    <link rel="preconnect" href="https://www.googleapis.com">
    <link rel="dns-prefetch" href="https://www.googleapis.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Your LGBTQ+ Event to Brum Outloud | Simple Form</title>
    <meta name="description" content="Use our simple form to submit your LGBTQ+ event details to Brum Outloud. Get your Birmingham queer events listed quickly and easily.">

    <link rel="stylesheet" href="/css/tailwind.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&family=Syne:wght@400;700;800&family=Bungee+Outline&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="icon" href="/faviconV2.png" type="image/png">
    <link rel="manifest" href="/manifest.json">

    <script src="/js/fouc-prevention.js"></script>
    <script src="/js/main.js"></script>
    <script src="/js/error-handling.js"></script>
    <script src="/js/form-validation.js"></script>
    <script src="/js/poster-parser-enhanced.js?v=2"></script>
    <script src="/js/recurring-events-enhanced.js"></script>
    <script src="/js/code-cleanup-manager.js"></script>

    <style>
        :root {
            --color-bg: #0d0115;
            --color-pink: #ff007f;
            --color-purple: #7a00ff;
            --color-toxic: #ccff00;
            --color-light: #f3e8ff;
        }

        body {
            background-color: var(--color-bg);
            color: var(--color-light);
            font-family: 'Space Grotesk', sans-serif;
            overflow-x: hidden;
            line-height: 1.4;
        }

        

        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
        }

        .form-field {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.15);
            color: white;
            transition: all 0.3s ease;
        }

        .form-field:focus {
            background: rgba(255,255,255,0.1);
            border-color: var(--color-pink);
            box-shadow: 4px 4px 0 var(--color-purple);
            outline: none;
        }
    </style>
</head>

<body class="grain selection:bg-[var(--color-toxic)] selection:text-black">
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-MMTDFZGH" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- Google Tag Manager -->
    

    <script>
        function initializeForm() {
            if (window.formInitialized) return;
            window.formInitialized = true;

            const form = document.getElementById('single-event-form');
            const venueSelect = document.getElementById('venue-select');
            const categorySelect = document.getElementById('category-select');
            const newVenueFields = document.getElementById('new-venue-fields');
            const newVenueNameInput = document.getElementById('new-venue-name');
            const newVenueAddressInput = document.getElementById('new-venue-address');
            const statusDiv = document.getElementById('form-status');
            const submitButton = document.getElementById('submit-button');
            const termsCheckbox = document.getElementById('terms-agree');

            if (!venueSelect || !categorySelect) return;

            termsCheckbox.addEventListener('change', () => {
                submitButton.disabled = !termsCheckbox.checked;
            });

            // --- Categories Population ---
            const categories = ["Comedy", "Drag", "Live Music", "Party", "Pride", "Social", "Theatre", "Viewing Party", "Kink", "Community", "Exhibition", "Health", "Quiz", "Trans & Non-Binary", "Sober", "Queer Women & Sapphic"];
            categorySelect.innerHTML = '';
            categories.forEach(categoryName => {
                const option = document.createElement('option');
                option.value = categoryName;
                option.textContent = categoryName;
                categorySelect.appendChild(option);
            });

            // --- Fetch venues ---
            const VENUES_API_ENDPOINT = '/.netlify/functions/get-venue-list';
            const CACHE_KEY = 'brumoutloud_venues_cache';

            const populateDropdown = (venuesList) => {
                venueSelect.innerHTML = '<option value="" disabled selected>Select an existing venue...</option>';
                venuesList.forEach(venue => {
                    const option = document.createElement('option');
                    option.value = venue.id;
                    option.textContent = venue.name;
                    venueSelect.appendChild(option);
                });
                venueSelect.insertAdjacentHTML('beforeend', '<option value="__CREATE_NEW__">-- Add a new venue --</option>');
            };

            const cachedData = localStorage.getItem(CACHE_KEY);
            let hasShownCached = false;

            if (cachedData) {
                try {
                    const parsedCache = JSON.parse(cachedData);
                    if (parsedCache && parsedCache.timestamp && (Date.now() - parsedCache.timestamp < 3600000) && Array.isArray(parsedCache.venues)) {
                        populateDropdown(parsedCache.venues);
                        hasShownCached = true;
                    }
                } catch (e) { console.error('Dropdown cache parsing error:', e); }
            }

            fetch(VENUES_API_ENDPOINT)
                .then(response => {
                    if (!response.ok) throw new Error(`Network response was not ok: ${response.statusText}`);
                    return response.json();
                })
                .then(venues => {
                    const venuesArray = Array.isArray(venues.venues) ? venues.venues : (Array.isArray(venues) ? venues : []);
                    if (venuesArray.length > 0) {
                        localStorage.setItem(CACHE_KEY, JSON.stringify({ timestamp: Date.now(), venues: venuesArray }));
                        if (!hasShownCached) populateDropdown(venuesArray);
                    }
                })
                .catch(error => {
                    console.error('Failed to load venues:', error);
                    if (!hasShownCached) venueSelect.innerHTML = '<option value="">Could not load venues</option>';
                });

            venueSelect.addEventListener('change', () => {
                if (venueSelect.value === '__CREATE_NEW__') {
                    newVenueFields.classList.remove('hidden');
                    newVenueNameInput.required = true;
                    newVenueAddressInput.required = true;
                } else {
                    newVenueFields.classList.add('hidden');
                    newVenueNameInput.required = false;
                    newVenueAddressInput.required = false;
                }
            });

            // --- Recurrence Logic ---
            const recurrenceTypeRadios = document.querySelectorAll('input[name="recurrence-type"]');
            const recurringOptionsDiv = document.getElementById('recurring-options');
            const weeklyOptionsDiv = document.getElementById('weekly-options');
            const monthlyOptionsDiv = document.getElementById('monthly-options');
            const monthlyTypeRadios = document.querySelectorAll('input[name="monthly_type"]');
            const monthlyByDateOptionsDiv = document.getElementById('monthly-by-date-options');
            const monthlyByDayOptionsDiv = document.getElementById('monthly-by-day-options');

            const updateRecurrenceVisibility = () => {
                const selectedRecurrenceType = document.querySelector('input[name="recurrence-type"]:checked').value;
                const endDateDiv = document.getElementById('recurrence-end-date');
                const endDateInput = document.getElementById('recurrence-end-date-input');

                recurringOptionsDiv.classList.add('hidden');
                weeklyOptionsDiv.classList.add('hidden');
                monthlyOptionsDiv.classList.add('hidden');
                if (endDateDiv) endDateDiv.classList.add('hidden');
                const exceptionsDiv = document.getElementById('recurrence-exceptions');
                if (exceptionsDiv) exceptionsDiv.classList.add('hidden');

                if (selectedRecurrenceType === 'weekly') {
                    recurringOptionsDiv.classList.remove('hidden');
                    weeklyOptionsDiv.classList.remove('hidden');
                    if (endDateDiv) endDateDiv.classList.remove('hidden');
                    if (exceptionsDiv) exceptionsDiv.classList.remove('hidden');
                } else if (selectedRecurrenceType === 'monthly') {
                    recurringOptionsDiv.classList.remove('hidden');
                    monthlyOptionsDiv.classList.remove('hidden');
                    if (endDateDiv) endDateDiv.classList.remove('hidden');
                    if (exceptionsDiv) exceptionsDiv.classList.remove('hidden');
                    updateMonthlyOptionsVisibility();
                }
            };

            const updateMonthlyOptionsVisibility = () => {
                const selectedMonthlyType = document.querySelector('input[name="monthly_type"]:checked').value;
                if (monthlyByDateOptionsDiv) monthlyByDateOptionsDiv.classList.add('hidden');
                if (monthlyByDayOptionsDiv) monthlyByDayOptionsDiv.classList.add('hidden');
                if (selectedMonthlyType === 'date' && monthlyByDateOptionsDiv) monthlyByDateOptionsDiv.classList.remove('hidden');
                else if (selectedMonthlyType === 'day' && monthlyByDayOptionsDiv) monthlyByDayOptionsDiv.classList.remove('hidden');
            };

            recurrenceTypeRadios.forEach(radio => radio.addEventListener('change', updateRecurrenceVisibility));
            monthlyTypeRadios.forEach(radio => radio.addEventListener('change', updateMonthlyOptionsVisibility));

            const updateRecurrencePreview = () => {
                const selectedType = document.querySelector('input[name="recurrence-type"]:checked').value;
                const previewDiv = document.getElementById('recurrence-preview');
                const previewDates = document.getElementById('preview-dates');
                if (selectedType === 'none') { previewDiv.classList.add('hidden'); return; }
                const startDate = document.getElementById('date').value;
                if (!startDate) { previewDiv.classList.add('hidden'); return; }
                let recurrenceData = null;
                if (selectedType === 'weekly') {
                    const weeklyDays = Array.from(document.querySelectorAll('input[name="weekly_days"]:checked')).map(cb => parseInt(cb.value, 10));
                    if (weeklyDays.length > 0) recurrenceData = { type: 'weekly', days: weeklyDays };
                } else if (selectedType === 'monthly') {
                    const mType = document.querySelector('input[name="monthly_type"]:checked').value;
                    if (mType === 'date') {
                        const dayOfMonth = document.getElementById('monthly-day-of-month')?.value;
                        if (dayOfMonth) recurrenceData = { type: 'monthly', monthlyType: 'date', dayOfMonth: parseInt(dayOfMonth, 10) };
                    } else if (mType === 'day') {
                        const week = document.getElementById('monthly-week')?.value;
                        const dayOfWeek = document.getElementById('monthly-day-of-week')?.value;
                        if (week && dayOfWeek) recurrenceData = { type: 'monthly', monthlyType: 'day', week: parseInt(week, 10), dayOfWeek: parseInt(dayOfWeek, 10) };
                    }
                }
                if (recurrenceData) {
                    const dates = calculateRecurringDates(startDate, recurrenceData, 3);
                    const filteredDates = dates.filter(date => !exceptionDates.includes(date));
                    if (filteredDates.length > 0) {
                        const dateList = filteredDates.slice(0, 8).map(date => new Date(date).toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' })).join(', ');
                        previewDates.innerHTML = dateList + (filteredDates.length > 8 ? ` and ${filteredDates.length - 8} more...` : '');
                        previewDiv.classList.remove('hidden');
                    } else previewDiv.classList.add('hidden');
                } else previewDiv.classList.add('hidden');
            };

            const calculateRecurringDates = (startDate, recurrenceData, monthsAhead = 3) => {
                const dates = [];
                const start = new Date(startDate);
                const endDate = new Date(start);
                endDate.setMonth(endDate.getMonth() + monthsAhead);
                if (recurrenceData.type === 'weekly') {
                    const daysOfWeek = recurrenceData.days || [];
                    let currentDate = new Date(start);
                    while (currentDate <= endDate) {
                        if (daysOfWeek.includes(currentDate.getDay())) dates.push(currentDate.toISOString().split('T')[0]);
                        currentDate.setDate(currentDate.getDate() + 1);
                    }
                } else if (recurrenceData.type === 'monthly') {
                    if (recurrenceData.monthlyType === 'date') {
                        const dayOfMonth = recurrenceData.dayOfMonth;
                        let currentDate = new Date(start);
                        while (currentDate <= endDate) {
                            const maxDay = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0).getDate();
                            const eventDate = new Date(currentDate.getFullYear(), currentDate.getMonth(), Math.min(dayOfMonth, maxDay));
                            if (eventDate >= start) dates.push(eventDate.toISOString().split('T')[0]);
                            currentDate.setMonth(currentDate.getMonth() + 1);
                        }
                    } else if (recurrenceData.monthlyType === 'day') {
                        const week = recurrenceData.week;
                        const dayOfWeek = recurrenceData.dayOfWeek;
                        let currentDate = new Date(start);
                        while (currentDate <= endDate) {
                            const eventDate = getNthWeekdayOfMonth(currentDate.getFullYear(), currentDate.getMonth(), week, dayOfWeek);
                            if (eventDate && eventDate >= start) dates.push(eventDate.toISOString().split('T')[0]);
                            currentDate.setMonth(currentDate.getMonth() + 1);
                        }
                    }
                }
                return dates;
            };

            const getNthWeekdayOfMonth = (year, month, week, dayOfWeek) => {
                const date = new Date(year, month, 1);
                if (week > 0) {
                    let day = date.getDay();
                    let diff = (dayOfWeek - day + 7) % 7;
                    date.setDate(date.getDate() + diff + (week - 1) * 7);
                } else {
                    date.setMonth(month + 1);
                    date.setDate(0);
                    let day = date.getDay();
                    let diff = (day - dayOfWeek + 7) % 7;
                    date.setDate(date.getDate() - diff);
                }
                return date.getMonth() === month ? date : null;
            };

            const weeklyDayCheckboxes = document.querySelectorAll('input[name="weekly_days"]');
            weeklyDayCheckboxes.forEach(cb => cb.addEventListener('change', updateRecurrencePreview));
            document.getElementById('monthly-day-of-month')?.addEventListener('input', updateRecurrencePreview);
            document.getElementById('monthly-week')?.addEventListener('change', updateRecurrencePreview);
            document.getElementById('monthly-day-of-week')?.addEventListener('change', updateRecurrencePreview);
            document.getElementById('date')?.addEventListener('change', updateRecurrencePreview);

            const exceptionDatesList = document.getElementById('exception-dates-list');
            let exceptionDates = [];
            if (exceptionDatesList) {
                exceptionDatesList.addEventListener('click', (e) => {
                    const removeBtn = e.target.closest('button[data-exception-date]');
                    if (removeBtn) {
                        exceptionDates = exceptionDates.filter(d => d !== removeBtn.dataset.exceptionDate);
                        renderExceptionDates();
                        updateRecurrencePreview();
                    }
                });
            }

            const addExceptionBtn = document.getElementById('add-exception-btn');
            const exceptionDateInput = document.getElementById('exception-date-input');
            if (addExceptionBtn && exceptionDateInput) {
                addExceptionBtn.addEventListener('click', () => {
                    if (exceptionDateInput.value && !exceptionDates.includes(exceptionDateInput.value)) {
                        exceptionDates.push(exceptionDateInput.value);
                        renderExceptionDates();
                        exceptionDateInput.value = '';
                        updateRecurrencePreview();
                    }
                });
            }

            const renderExceptionDates = () => {
                if (!exceptionDatesList) return;
                exceptionDatesList.innerHTML = exceptionDates.map(date => `
                    <div class="flex items-center justify-between p-2 bg-black/50 border border-gray-600">
                        <span class="text-sm text-gray-300">${new Date(date).toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' })}</span>
                        <button type="button" class="text-red-400 hover:text-red-300" data-exception-date="${date}"><i class="fas fa-times"></i></button>
                    </div>
                `).join('');
            };

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                try {
                    document.querySelectorAll('.border-red-500').forEach(f => f.classList.remove('border-red-500'));
                    const errors = [];
                    if (!termsCheckbox.checked) errors.push('You must agree to terms.');
                    const eventName = document.getElementById('event-name').value.trim();
                    const eventDate = document.getElementById('date').value;
                    if (!eventName) { errors.push('Name required.'); document.getElementById('event-name').classList.add('border-red-500'); }
                    if (!eventDate) { errors.push('Date required.'); document.getElementById('date').classList.add('border-red-500'); }
                    if (!venueSelect.value) { errors.push('Venue required.'); venueSelect.classList.add('border-red-500'); }
                    const selectedCategories = Array.from(categorySelect.selectedOptions).map(o => o.value);
                    if (selectedCategories.length === 0) { errors.push('Category required.'); categorySelect.classList.add('border-red-500'); }

                    if (errors.length > 0) {
                        statusDiv.innerHTML = `<ul class="text-left">${errors.map(err => `<li>${err}</li>`).join('')}</ul>`;
                        statusDiv.className = 'p-4 bg-red-800/20 border-2 border-red-500 text-white';
                        statusDiv.classList.remove('hidden');
                        return;
                    }

                    submitButton.disabled = true;
                    submitButton.textContent = 'Submitting...';
                    let venueId = venueSelect.value;
                    if (venueId === '__CREATE_NEW__') {
                        const newVenueName = newVenueNameInput.value.trim();
                        const newVenueAddress = newVenueAddressInput.value.trim();
                        const res = await fetch('/.netlify/functions/venue-submission', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ venueName: newVenueName, address: newVenueAddress, status: 'pending' }),
                        });
                        const resJson = await res.json();
                        if (res.ok && resJson.success) venueId = resJson.id;
                        else throw new Error(resJson.message || 'Venue creation failed');
                    }

                    const formData = new FormData(form);
                    formData.set('venueId', venueId);
                    formData.delete('categoryIds');
                    selectedCategories.forEach(c => formData.append('categoryIds', c));
                    const selectedRecType = document.querySelector('input[name="recurrence-type"]:checked').value;
                    if (selectedRecType !== 'none') {
                        let rule = { type: selectedRecType };
                        if (selectedRecType === 'weekly') rule.days = Array.from(document.querySelectorAll('input[name="weekly_days"]:checked')).map(cb => parseInt(cb.value, 10));
                        else {
                            const mType = document.querySelector('input[name="monthly_type"]:checked').value;
                            if (mType === 'date') rule.dayOfMonth = parseInt(document.getElementById('monthly-day-of-month').value, 10);
                            else { rule.week = parseInt(document.getElementById('monthly-week').value, 10); rule.dayOfWeek = parseInt(document.getElementById('monthly-day-of-week').value, 10); }
                        }
                        const endDate = document.getElementById('recurrence-end-date-input')?.value;
                        if (endDate) rule.endDate = endDate;
                        if (exceptionDates.length > 0) rule.exceptions = exceptionDates;
                        formData.set('recurring-info', JSON.stringify(rule));
                    }

                    const subRes = await fetch('/.netlify/functions/event-submission', { method: 'POST', body: formData });
                    if (subRes.ok) {
                        statusDiv.textContent = 'Success! Event submitted.';
                        statusDiv.className = 'p-4 bg-green-800 text-white';
                        form.reset();
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    } else {
                        const subErr = await subRes.json().catch(() => ({ message: 'Submission failed' }));
                        throw new Error(subErr.message);
                    }
                } catch (err) {
                    console.error(err);
                    statusDiv.textContent = `Error: ${err.message}`;
                    statusDiv.className = 'p-4 bg-red-800 text-white';
                    submitButton.disabled = false;
                    submitButton.textContent = 'Submit Event';
                }
            });
        }

        if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', initializeForm);
        else initializeForm();
    </script>
</body>
</html>
