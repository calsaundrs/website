<!-- TITLE: Contact Us -->
<!-- DESCRIPTION: Get in touch with Brum Outloud. Send us your questions, suggestions, or feedback about the LGBTQ+ scene in Birmingham. We're here to help! -->

    <section class="max-w-4xl mx-auto">
        <div class="text-center mb-16 relative">
            <!-- Duct Tape Decoration -->
            <div class="duct-tape rotate-[-3deg] w-48 text-center left-1/2 -translate-x-1/2 -top-6 text-sm">TALK TO US</div>
            
            <h1 class="font-anton text-[4rem] md:text-8xl leading-none tracking-tight heading-gradient pt-8 misprint">
            CONTACT <span class="bg-[var(--color-pink)] text-[#000] px-4 mx-2 border-4 border-black rotate-2 inline-block shadow-[6px_6px_0_var(--color-toxic)]">BRUM OUTLOUD</span>
            </h1>
            
            <h2 class="mt-8 text-2xl font-black font-display uppercase">Got a question, suggestion, or feedback about the LGBTQ+ scene in Birmingham?</h2>
        </div>

        <div class="max-w-2xl mx-auto">
            <form name="contact" method="POST" netlify class="bg-black border-4 border-[var(--color-purple)] p-8 md:p-12 shadow-[12px_12px_0_var(--color-toxic)] mx-auto relative transform rotate-[1deg]">
                
                <div class="sticker bg-white text-black text-xs absolute -top-4 -left-4 -rotate-12">YRIGHT BAB?</div>

                <div class="space-y-8">
                    <div>
                        <label for="name" class="block font-display font-black text-2xl uppercase text-white mb-2">Your Name</label>
                        <input type="text" id="name" name="name" class="w-full bg-white text-black border-4 border-black p-4 text-xl font-bold font-['Space_Grotesk'] focus:outline-none focus:border-[var(--color-pink)] focus:shadow-[6px_6px_0_var(--color-purple)] transition-all" required placeholder="Who's asking?">
                    </div>
                    
                    <div>
                        <label for="email" class="block font-display font-black text-2xl uppercase text-white mb-2">Your Email</label>
                        <input type="email" id="email" name="email" class="w-full bg-white text-black border-4 border-black p-4 text-xl font-bold font-['Space_Grotesk'] focus:outline-none focus:border-[var(--color-pink)] focus:shadow-[6px_6px_0_var(--color-purple)] transition-all" required placeholder="So we can hit you back">
                    </div>
                    
                    <div>
                        <label for="subject" class="block font-display font-black text-2xl uppercase text-white mb-2">Subject</label>
                        <input type="text" id="subject" name="subject" class="w-full bg-white text-black border-4 border-black p-4 text-xl font-bold font-['Space_Grotesk'] focus:outline-none focus:border-[var(--color-pink)] focus:shadow-[6px_6px_0_var(--color-purple)] transition-all" required placeholder="What's the tea?">
                    </div>
                    
                    <div>
                        <label for="message" class="block font-display font-black text-2xl uppercase text-white mb-2">Message</label>
                        <textarea id="message" name="message" rows="5" class="w-full bg-white text-black border-4 border-black p-4 text-xl font-bold font-['Space_Grotesk'] focus:outline-none focus:border-[var(--color-pink)] focus:shadow-[6px_6px_0_var(--color-purple)] transition-all resize-y" required placeholder="Spill it..."></textarea>
                    </div>
                    
                    <div class="text-right pt-6">
                        <button type="submit" class="bg-[var(--color-toxic)] text-black border-4 border-black px-8 py-4 font-display font-black text-2xl uppercase hover:bg-[var(--color-pink)] hover:text-white transition-all shadow-[6px_6px_0_var(--color-purple)] hover:translate-x-1 hover:translate-y-1 hover:shadow-[2px_2px_0_var(--color-purple)] w-full sm:w-auto text-center cursor-pointer">
                            Send It
                        </button>
                    </div>
                </div>
            </form>
        </div>
        
    </section>
