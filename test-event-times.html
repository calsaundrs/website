<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Event Times - BrumOutLoud</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold text-gray-800 mb-8">🔍 Event Times Test</h1>
        
        <div class="bg-white rounded-lg shadow-lg p-6 mb-8">
            <h2 class="text-xl font-semibold mb-4">Instructions</h2>
            <p class="text-gray-600 mb-4">
                This page will fetch recent events from the database and display their times to verify if they're showing correctly.
                Compare the displayed times with what you originally submitted.
            </p>
            <button id="fetchEvents" class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-2 rounded-lg">
                Fetch Recent Events
            </button>
        </div>

        <div id="loading" class="hidden bg-white rounded-lg shadow-lg p-6 mb-8">
            <div class="flex items-center">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500 mr-4"></div>
                <span class="text-gray-600">Loading events...</span>
            </div>
        </div>

        <div id="results" class="space-y-4"></div>
    </div>

    <script>
        document.getElementById('fetchEvents').addEventListener('click', fetchRecentEvents);

        async function fetchRecentEvents() {
            const loading = document.getElementById('loading');
            const results = document.getElementById('results');
            
            loading.classList.remove('hidden');
            results.innerHTML = '';

            try {
                // Fetch recent events
                const response = await fetch('/.netlify/functions/get-events-firestore-simple?limit=20');
                const data = await response.json();

                if (!data.success || !data.events) {
                    throw new Error('Failed to fetch events');
                }

                displayEvents(data.events);

            } catch (error) {
                console.error('Error fetching events:', error);
                results.innerHTML = `
                    <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded">
                        Error fetching events: ${error.message}
                    </div>
                `;
            } finally {
                loading.classList.add('hidden');
            }
        }

        function displayEvents(events) {
            const results = document.getElementById('results');
            
            if (events.length === 0) {
                results.innerHTML = `
                    <div class="bg-yellow-100 border border-yellow-400 text-yellow-700 px-4 py-3 rounded">
                        No events found
                    </div>
                `;
                return;
            }

            const eventsHtml = events.map(event => {
                // Parse the date and time
                const eventDate = new Date(event.date);
                const timeString = eventDate.toLocaleTimeString('en-GB', { 
                    hour: '2-digit', 
                    minute: '2-digit',
                    timeZone: 'Europe/London'
                });
                
                const dateString = eventDate.toLocaleDateString('en-GB', {
                    weekday: 'long',
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric',
                    timeZone: 'Europe/London'
                });

                // Get the original time from the date string
                const originalTime = eventDate.toTimeString().split(' ')[0].substring(0, 5);
                
                return `
                    <div class="bg-white rounded-lg shadow-lg p-6">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="text-xl font-semibold text-gray-800">${event.name}</h3>
                                <p class="text-gray-600">${event.venueName || 'No venue'}</p>
                            </div>
                            <div class="text-right">
                                <div class="text-sm text-gray-500">Event ID</div>
                                <div class="font-mono text-xs text-gray-400">${event.id}</div>
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                            <div class="bg-gray-50 p-4 rounded-lg">
                                <div class="text-sm font-medium text-gray-500 mb-1">Raw Date from DB</div>
                                <div class="font-mono text-sm">${event.date}</div>
                            </div>
                            
                            <div class="bg-blue-50 p-4 rounded-lg">
                                <div class="text-sm font-medium text-blue-600 mb-1">Displayed Date</div>
                                <div class="font-semibold">${dateString}</div>
                            </div>
                            
                            <div class="bg-green-50 p-4 rounded-lg">
                                <div class="text-sm font-medium text-green-600 mb-1">Displayed Time</div>
                                <div class="font-semibold text-lg">${timeString}</div>
                            </div>
                        </div>
                        
                        <div class="bg-yellow-50 p-4 rounded-lg">
                            <div class="text-sm font-medium text-yellow-700 mb-2">Time Analysis</div>
                            <div class="grid grid-cols-2 gap-4 text-sm">
                                <div>
                                    <span class="font-medium">Original Time (HH:MM):</span>
                                    <span class="font-mono ml-2">${originalTime}</span>
                                </div>
                                <div>
                                    <span class="font-medium">ISO String:</span>
                                    <span class="font-mono ml-2">${eventDate.toISOString()}</span>
                                </div>
                                <div>
                                    <span class="font-medium">UTC Time:</span>
                                    <span class="font-mono ml-2">${eventDate.toUTCString()}</span>
                                </div>
                                <div>
                                    <span class="font-medium">Timezone Offset:</span>
                                    <span class="font-mono ml-2">${eventDate.getTimezoneOffset()} minutes</span>
                                </div>
                            </div>
                        </div>
                        
                        ${event.description ? `
                            <div class="mt-4 p-4 bg-gray-50 rounded-lg">
                                <div class="text-sm font-medium text-gray-500 mb-1">Description</div>
                                <div class="text-gray-700">${event.description}</div>
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');

            results.innerHTML = `
                <div class="mb-4">
                    <h2 class="text-2xl font-bold text-gray-800 mb-2">Recent Events (${events.length})</h2>
                    <p class="text-gray-600">Showing the most recent events to check if times are displaying correctly</p>
                </div>
                ${eventsHtml}
            `;
        }
    </script>
</body>
</html>
