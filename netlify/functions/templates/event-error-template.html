<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Not Found | Brum Outloud</title>
    <meta name="description" content="Sorry, this event could not be found.">
    <link rel="canonical" href="{{pageUrl}}">
    <link rel="icon" type="image/png" href="/faviconV2.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body class="bg-gray-900 text-white">
    <div class="min-h-screen flex items-center justify-center">
        <div class="text-center p-8">
            <h1 class="text-4xl font-bold mb-4">Event Not Found</h1>
            <p class="text-gray-300 mb-8">Sorry, we couldn't find the event details you were looking for.</p>
            
            <div class="space-y-4">
                <p class="text-sm text-gray-400">Event slug: <code class="bg-gray-800 p-1 rounded">{{slug}}</code></p>
                {{#if error}}
                <details class="text-left">
                    <summary class="cursor-pointer text-blue-400 hover:text-blue-300">Error Details</summary>
                    <pre class="bg-gray-800 p-4 rounded mt-2 text-xs overflow-auto">{{error}}</pre>
                </details>
                {{/if}}
            </div>
            
            <div class="mt-8 space-x-4">
                <a href="/events.html" class="inline-block bg-purple-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-purple-700 transition-colors">
                    View All Events
                </a>
                <a href="/" class="inline-block bg-gray-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-gray-700 transition-colors">
                    Go Home
                </a>
            </div>
        </div>
    </div>
</body>
</html>
