<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: sans-serif; }
  .container { width: 100%; max-width: 600px; margin: 0 auto; }
  .header { background: #f2f2f2; padding: 20px; text-align: center; }
  .content { padding: 20px; }
  .footer { background: #f2f2f2; padding: 20px; text-align: center; font-size: 12px; }
</style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>New Event Submission</h1>
    </div>
    <div class="content">
      <p>A new event has been submitted to Brum Outloud.</p>
      <ul>
        <li><strong>Event Name:</strong> {{eventName}}</li>
        <li><strong>Venue:</strong> {{venueName}}</li>
        <li><strong>Date:</strong> {{eventDate}}</li>
        <li><strong>Submitted by:</strong> {{submittedBy}}</li>
      </ul>
      <p>Please review it in the admin panel.</p>
    </div>
    <div class="footer">
      <p>&copy; 2025 Brum Outloud. All rights reserved.</p>
    </div>
  </div>
</body>
</html>
