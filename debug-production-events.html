<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Production Events Debug - BrumOutLoud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <!-- FOUC Prevention: Critical CSS and Loading Screen -->
    <style>
        /* FOUC Prevention - Hide content until styles are loaded */
        .fouc-prevention {
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        
        .fouc-prevention.loaded {
            visibility: visible;
            opacity: 1;
        }
        
        /* Loading screen */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #121212 0%, #1a1a1a 50%, #2d1b69 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        
        .loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }
        
        .loading-logo {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }
        
        .loading-text {
            color: #B564F7;
            font-family: 'Poppins', sans-serif;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(181, 100, 247, 0.3);
            border-top: 3px solid #B564F7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Critical CSS to prevent flashing */
        body {
            background-color: #121212;
            color: #EAEAEA;
            font-family: 'Poppins', system-ui, -apple-system, sans-serif;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            margin: 0;
            padding: 0;
        }
        
        /* Basic layout styles to prevent layout shift */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
        }
        
        /* Prevent pride flag from flashing at full size */
        img[src*="progressflag"] {
            height: 1.5rem !important;
            width: auto !important;
            max-width: 1.5rem !important;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        /* Show flag after page loads */
        .flag-loaded img[src*="progressflag"] {
            opacity: 1;
        }
    </style>
    
    <!-- FOUC Prevention Script -->
    <script src="/js/fouc-prevention.js"></script>
    </head>
<body class="bg-gray-900 text-white min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold mb-8">Production Events Debug</h1>
        
        <div class="space-y-6">
            <!-- Test Button -->
            <div class="bg-gray-800 p-6 rounded-lg">
                <h2 class="text-xl font-semibold mb-4">Test Rebuild Events Button</h2>
                <button id="rebuild-events-btn" class="admin-link rounded-xl p-6 relative group text-left w-full">
                    <div class="flex items-center justify-between mb-4">
                        <div class="text-2xl text-accent-color">
                            <i class="fas fa-calendar-alt"></i>
                        </div>
                        <div id="rebuild-events-status" class="hidden">
                            <div class="animate-spin rounded-full h-6 w-6 border-b-2 border-accent-color"></div>
                        </div>
                    </div>
                    <h3 class="text-xl font-bold text-white mb-2">Rebuild Event Pages</h3>
                    <p class="text-gray-400 text-sm">Regenerate all static event pages with latest data</p>
                    <div class="flex items-center justify-between mt-4">
                        <div class="text-accent-color group-hover:translate-x-2 transition-transform">
                            <i class="fas fa-arrow-right"></i>
                        </div>
                        <div id="last-rebuild-events-info" class="text-xs text-gray-500 hidden">
                            <span id="last-rebuild-events-time">-</span>
                        </div>
                    </div>
                </button>
            </div>

            <!-- Debug Info -->
            <div class="bg-gray-800 p-6 rounded-lg">
                <h2 class="text-xl font-semibold mb-4">Debug Information</h2>
                <div id="debug-info" class="space-y-2 text-sm">
                    <p>Loading debug info...</p>
                </div>
            </div>

            <!-- Test Results -->
            <div class="bg-gray-800 p-6 rounded-lg">
                <h2 class="text-xl font-semibold mb-4">Test Results</h2>
                <div id="test-results" class="space-y-2">
                    <p class="text-gray-400">No tests run yet</p>
                </div>
            </div>

            <!-- Manual Test -->
            <div class="bg-gray-800 p-6 rounded-lg">
                <h2 class="text-xl font-semibold mb-4">Manual Function Test</h2>
                <div class="space-y-2">
                    <button id="test-function-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded">
                        Test Netlify Function Directly
                    </button>
                    <button id="test-detailed-btn" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded">
                        Run Detailed Diagnostic
                    </button>
                    <button id="test-simple-btn" class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded">
                        Test Simple Firebase
                    </button>
                    <button id="test-simple-build-btn" class="bg-orange-600 hover:bg-orange-700 text-white px-4 py-2 rounded">
                        Test Simple Build
                    </button>
                </div>
                <div id="function-results" class="mt-4 text-sm"></div>
            </div>
        </div>
    </div>

    <script>
        // Debug info
        function updateDebugInfo() {
            const debugInfo = document.getElementById('debug-info');
            debugInfo.innerHTML = `
                <p><strong>User Agent:</strong> ${navigator.userAgent}</p>
                <p><strong>URL:</strong> ${window.location.href}</p>
                <p><strong>Protocol:</strong> ${window.location.protocol}</p>
                <p><strong>Host:</strong> ${window.location.host}</p>
                <p><strong>Path:</strong> ${window.location.pathname}</p>
                <p><strong>Timestamp:</strong> ${new Date().toISOString()}</p>
                <p><strong>Local Storage Available:</strong> ${typeof(Storage) !== "undefined"}</p>
                <p><strong>Fetch Available:</strong> ${typeof fetch !== 'undefined'}</p>
            `;
        }

        // Test function directly
        async function testFunction() {
            const resultsDiv = document.getElementById('function-results');
            resultsDiv.innerHTML = '<p class="text-yellow-400">Testing function...</p>';
            
            try {
                const response = await fetch('/.netlify/functions/build-events-ssg', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        action: 'rebuild',
                        source: 'debug-page'
                    })
                });
                
                const result = await response.json();
                
                resultsDiv.innerHTML = `
                    <div class="bg-gray-700 p-4 rounded">
                        <p><strong>Status:</strong> ${response.status}</p>
                        <p><strong>Success:</strong> ${result.success}</p>
                        <p><strong>Message:</strong> ${result.message || 'N/A'}</p>
                        <p><strong>Generated Files:</strong> ${result.generatedFiles || 0}</p>
                        <p><strong>Environment:</strong> ${result.environment || 'N/A'}</p>
                        <p><strong>Firebase Status:</strong> ${result.firebaseStatus || 'N/A'}</p>
                        <pre class="text-xs mt-2 bg-gray-900 p-2 rounded overflow-auto">${JSON.stringify(result, null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                resultsDiv.innerHTML = `
                    <div class="bg-red-900 p-4 rounded">
                        <p><strong>Error:</strong> ${error.message}</p>
                        <p><strong>Type:</strong> ${error.name}</p>
                    </div>
                `;
            }
        }

        // Test simple Firebase function
        async function testSimple() {
            const resultsDiv = document.getElementById('function-results');
            resultsDiv.innerHTML = '<p class="text-yellow-400">Testing simple Firebase function...</p>';
            
            try {
                const response = await fetch('/.netlify/functions/test-build-events-simple', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        action: 'test',
                        source: 'debug-page'
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    resultsDiv.innerHTML = `
                        <div class="bg-gray-700 p-4 rounded">
                            <p><strong>Status:</strong> ${response.status}</p>
                            <p><strong>Success:</strong> ${result.success}</p>
                            <p><strong>Firebase Status:</strong> ${result.firebaseStatus}</p>
                            <p><strong>Event Count:</strong> ${result.eventCount}</p>
                            <p><strong>Environment:</strong> ${result.environment}</p>
                            <pre class="text-xs mt-2 bg-gray-900 p-2 rounded overflow-auto">${JSON.stringify(result, null, 2)}</pre>
                        </div>
                    `;
                } else {
                    resultsDiv.innerHTML = `
                        <div class="bg-red-900 p-4 rounded">
                            <p><strong>Error:</strong> ${result.error || 'Unknown error'}</p>
                            <pre class="text-xs mt-2 bg-gray-900 p-2 rounded overflow-auto">${JSON.stringify(result, null, 2)}</pre>
                        </div>
                    `;
                }
            } catch (error) {
                resultsDiv.innerHTML = `
                    <div class="bg-red-900 p-4 rounded">
                        <p><strong>Error:</strong> ${error.message}</p>
                        <p><strong>Type:</strong> ${error.name}</p>
                    </div>
                `;
            }
        }

        // Test simple build function
        async function testSimpleBuild() {
            const resultsDiv = document.getElementById('function-results');
            resultsDiv.innerHTML = '<p class="text-yellow-400">Testing simple build function...</p>';
            
            try {
                const response = await fetch('/.netlify/functions/build-events-ssg-simple', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        action: 'rebuild',
                        source: 'debug-page'
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    resultsDiv.innerHTML = `
                        <div class="bg-gray-700 p-4 rounded">
                            <p><strong>Status:</strong> ${response.status}</p>
                            <p><strong>Success:</strong> ${result.success}</p>
                            <p><strong>Generated Files:</strong> ${result.generatedFiles}</p>
                            <p><strong>Firebase Status:</strong> ${result.firebaseStatus}</p>
                            <p><strong>Environment:</strong> ${result.environment}</p>
                            <p><strong>Has Events:</strong> ${result.hasEvents}</p>
                            <pre class="text-xs mt-2 bg-gray-900 p-2 rounded overflow-auto">${JSON.stringify(result, null, 2)}</pre>
                        </div>
                    `;
                } else {
                    resultsDiv.innerHTML = `
                        <div class="bg-red-900 p-4 rounded">
                            <p><strong>Error:</strong> ${result.error || 'Unknown error'}</p>
                            <pre class="text-xs mt-2 bg-gray-900 p-2 rounded overflow-auto">${JSON.stringify(result, null, 2)}</pre>
                        </div>
                    `;
                }
            } catch (error) {
                resultsDiv.innerHTML = `
                    <div class="bg-red-900 p-4 rounded">
                        <p><strong>Error:</strong> ${error.message}</p>
                        <p><strong>Type:</strong> ${error.name}</p>
                    </div>
                `;
            }
        }

        // Test detailed diagnostic
        async function testDetailed() {
            const resultsDiv = document.getElementById('function-results');
            resultsDiv.innerHTML = '<p class="text-yellow-400">Running detailed diagnostic...</p>';
            
            try {
                const response = await fetch('/.netlify/functions/debug-events-ssg-detailed', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        action: 'diagnostic',
                        source: 'debug-page'
                    })
                });
                
                const result = await response.json();
                
                if (result.success && result.diagnostics) {
                    const diag = result.diagnostics;
                    resultsDiv.innerHTML = `
                        <div class="bg-gray-700 p-4 rounded space-y-4">
                            <div>
                                <h3 class="font-bold text-lg mb-2">Environment</h3>
                                <p><strong>NODE_ENV:</strong> ${diag.environment.NODE_ENV || 'N/A'}</p>
                                <p><strong>NETLIFY:</strong> ${diag.environment.NETLIFY || 'N/A'}</p>
                            </div>
                            
                            <div>
                                <h3 class="font-bold text-lg mb-2">Firebase Credentials</h3>
                                <p><strong>PROJECT_ID:</strong> ${diag.firebase.FIREBASE_PROJECT_ID}</p>
                                <p><strong>CLIENT_EMAIL:</strong> ${diag.firebase.FIREBASE_CLIENT_EMAIL}</p>
                                <p><strong>PRIVATE_KEY:</strong> ${diag.firebase.FIREBASE_PRIVATE_KEY}</p>
                                ${diag.firebase.initializationError ? `<p class="text-red-400"><strong>Init Error:</strong> ${diag.firebase.initializationError}</p>` : ''}
                                ${diag.firebase.testQuery ? `
                                    <p><strong>Test Query:</strong> ${diag.firebase.testQuery.success ? 'Success' : 'Failed'}</p>
                                    ${diag.firebase.testQuery.success ? `<p><strong>Event Count:</strong> ${diag.firebase.testQuery.eventCount}</p>` : ''}
                                    ${diag.firebase.testQuery.error ? `<p class="text-red-400"><strong>Query Error:</strong> ${diag.firebase.testQuery.error}</p>` : ''}
                                ` : ''}
                            </div>
                            
                            <div>
                                <h3 class="font-bold text-lg mb-2">Files</h3>
                                <p><strong>Build Script:</strong> ${diag.files.buildScriptExists ? '✅ Found' : '❌ Missing'}</p>
                                <p><strong>Event Directory:</strong> ${diag.files.eventDirExists ? '✅ Found' : '❌ Missing'}</p>
                                <p><strong>Template:</strong> ${diag.files.templateExists ? '✅ Found' : '❌ Missing'}</p>
                                ${diag.files.eventFiles ? `<p><strong>Event Files:</strong> ${diag.files.eventFiles.length} HTML files</p>` : ''}
                            </div>
                            
                            <div>
                                <h3 class="font-bold text-lg mb-2">Build Script Execution</h3>
                                <p><strong>Executed:</strong> ${diag.buildScript.executed ? '✅ Yes' : '❌ No'}</p>
                                ${diag.buildScript.executed ? `
                                    <p><strong>Exit Code:</strong> ${diag.buildScript.exitCode}</p>
                                    <p><strong>Has Error:</strong> ${diag.buildScript.hasError ? '❌ Yes' : '✅ No'}</p>
                                    <p><strong>Output Length:</strong> ${diag.buildScript.outputLength} characters</p>
                                    <p><strong>Error Length:</strong> ${diag.buildScript.errorLength} characters</p>
                                    ${diag.buildScript.htmlFileCount ? `<p><strong>HTML Files After:</strong> ${diag.buildScript.htmlFileCount}</p>` : ''}
                                    ${diag.buildScript.stdout ? `<details class="mt-2"><summary class="cursor-pointer">Build Output</summary><pre class="text-xs bg-gray-900 p-2 rounded mt-1 overflow-auto">${diag.buildScript.stdout}</pre></details>` : ''}
                                    ${diag.buildScript.stderr ? `<details class="mt-2"><summary class="cursor-pointer text-red-400">Build Errors</summary><pre class="text-xs bg-red-900 p-2 rounded mt-1 overflow-auto">${diag.buildScript.stderr}</pre></details>` : ''}
                                ` : ''}
                                ${diag.buildScript.error ? `<p class="text-red-400"><strong>Execution Error:</strong> ${diag.buildScript.error}</p>` : ''}
                            </div>
                            
                            <details class="mt-4">
                                <summary class="cursor-pointer font-bold">Full Diagnostic Data</summary>
                                <pre class="text-xs bg-gray-900 p-2 rounded mt-2 overflow-auto">${JSON.stringify(diag, null, 2)}</pre>
                            </details>
                        </div>
                    `;
                } else {
                    resultsDiv.innerHTML = `
                        <div class="bg-red-900 p-4 rounded">
                            <p><strong>Error:</strong> ${result.error || 'Unknown error'}</p>
                            <pre class="text-xs mt-2 bg-gray-900 p-2 rounded overflow-auto">${JSON.stringify(result, null, 2)}</pre>
                        </div>
                    `;
                }
            } catch (error) {
                resultsDiv.innerHTML = `
                    <div class="bg-red-900 p-4 rounded">
                        <p><strong>Error:</strong> ${error.message}</p>
                        <p><strong>Type:</strong> ${error.name}</p>
                    </div>
                `;
            }
        }

        // Setup rebuild events functionality (copied from admin-dashboard.js)
        function setupRebuildEvents() {
            console.log('Setting up rebuild events functionality...');
            const rebuildBtn = document.getElementById('rebuild-events-btn');
            const rebuildStatus = document.getElementById('rebuild-events-status');
            
            console.log('Rebuild events button found:', !!rebuildBtn);
            console.log('Rebuild events status found:', !!rebuildStatus);
            
            // Load last rebuild time from localStorage
            const lastRebuildInfo = document.getElementById('last-rebuild-events-info');
            const lastRebuildTime = document.getElementById('last-rebuild-events-time');
            if (lastRebuildInfo && lastRebuildTime) {
                const lastRebuild = localStorage.getItem('lastEventRebuild');
                if (lastRebuild) {
                    try {
                        const rebuildData = JSON.parse(lastRebuild);
                        const rebuildDate = new Date(rebuildData.timestamp);
                        lastRebuildTime.textContent = `Last: ${rebuildDate.toLocaleString()}`;
                        lastRebuildInfo.classList.remove('hidden');
                    } catch (error) {
                        console.warn('Error parsing last event rebuild data:', error);
                    }
                }
            }
            
            if (rebuildBtn) {
                console.log('Adding click listener to rebuild events button...');
                rebuildBtn.addEventListener('click', async () => {
                    try {
                        console.log('Rebuild events button clicked!');
                        if (rebuildBtn.disabled) {
                            console.log('Button is disabled, returning');
                            return;
                        }
                    
                        // Show confirmation dialog
                        console.log('Showing confirmation dialog...');
                        const confirmed = confirm('Are you sure you want to rebuild all event pages? This will regenerate all static event files with the latest data from the database.');
                        console.log('Confirmation result:', confirmed);
                        
                        if (!confirmed) {
                            console.log('User cancelled rebuild');
                            return;
                        }
                        
                        console.log('User confirmed rebuild, starting process...');
                        
                        try {
                            // Show loading state
                            rebuildBtn.disabled = true;
                            rebuildStatus.classList.remove('hidden');
                            rebuildBtn.querySelector('.fa-calendar-alt').classList.add('animate-spin');
                            
                            // Update test results
                            const testResults = document.getElementById('test-results');
                            testResults.innerHTML = '<p class="text-yellow-400">Starting rebuild process...</p>';
                            
                            // Call the rebuild function
                            console.log('Calling rebuild events function...');
                            const response = await fetch('/.netlify/functions/build-events-ssg', {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json'
                                },
                                body: JSON.stringify({ 
                                    action: 'rebuild',
                                    source: 'debug-page'
                                })
                            });
                            
                            console.log('Rebuild events response status:', response.status);
                            
                            if (!response.ok) {
                                throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                            }
                            
                            const result = await response.json();
                            console.log('Rebuild events result:', result);
                            
                            if (result.success) {
                                testResults.innerHTML = `
                                    <div class="bg-green-900 p-4 rounded">
                                        <p class="text-green-400 font-bold">✅ Success!</p>
                                        <p>Generated ${result.generatedFiles || 0} event pages</p>
                                        <p>Environment: ${result.environment}</p>
                                        <p>Firebase Status: ${result.firebaseStatus}</p>
                                    </div>
                                `;
                                
                                // Update last rebuild time
                                if (lastRebuildInfo && lastRebuildTime) {
                                    const now = new Date();
                                    lastRebuildTime.textContent = `Last: ${now.toLocaleString()}`;
                                    lastRebuildInfo.classList.remove('hidden');
                                }
                                
                                // Store rebuild info in localStorage
                                localStorage.setItem('lastEventRebuild', JSON.stringify({
                                    timestamp: new Date().toISOString(),
                                    filesGenerated: result.generatedFiles || 0,
                                    source: result.source || 'debug-page'
                                }));
                                
                            } else {
                                throw new Error(result.error || 'Unknown error occurred');
                            }
                            
                        } catch (error) {
                            console.error('Error rebuilding events:', error);
                            const testResults = document.getElementById('test-results');
                            testResults.innerHTML = `
                                <div class="bg-red-900 p-4 rounded">
                                    <p class="text-red-400 font-bold">❌ Error!</p>
                                    <p>${error.message}</p>
                                </div>
                            `;
                        } finally {
                            // Reset button state
                            rebuildBtn.disabled = false;
                            rebuildStatus.classList.add('hidden');
                            rebuildBtn.querySelector('.fa-calendar-alt').classList.remove('animate-spin');
                        }
                                    } catch (error) {
                    console.error('Unexpected error in rebuild events button click handler:', error);
                    const testResults = document.getElementById('test-results');
                    if (testResults) {
                        testResults.innerHTML = `
                            <div class="bg-red-900 p-4 rounded">
                                <p class="text-red-400 font-bold">❌ Unexpected Error!</p>
                                <p>${error.message}</p>
                            </div>
                        `;
                    }
                }
                });
            } else {
                console.error('Rebuild events button not found!');
                const testResults = document.getElementById('test-results');
                testResults.innerHTML = `
                    <div class="bg-red-900 p-4 rounded">
                        <p class="text-red-400 font-bold">❌ Button Not Found!</p>
                        <p>The rebuild-events-btn element was not found in the DOM</p>
                    </div>
                `;
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            console.log('Debug page loaded');
            updateDebugInfo();
            setupRebuildEvents();
            
            // Setup manual test buttons
            const testFunctionBtn = document.getElementById('test-function-btn');
            const testDetailedBtn = document.getElementById('test-detailed-btn');
            const testSimpleBtn = document.getElementById('test-simple-btn');
            const testSimpleBuildBtn = document.getElementById('test-simple-build-btn');
            if (testFunctionBtn) {
                testFunctionBtn.addEventListener('click', testFunction);
            }
            if (testDetailedBtn) {
                testDetailedBtn.addEventListener('click', testDetailed);
            }
            if (testSimpleBtn) {
                testSimpleBtn.addEventListener('click', testSimple);
            }
            if (testSimpleBuildBtn) {
                testSimpleBuildBtn.addEventListener('click', testSimpleBuild);
            }
        });
    </script>
</body>
</html>
