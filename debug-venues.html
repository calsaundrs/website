<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Venues - Brum Out Loud</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- FOUC Prevention: Critical CSS and Loading Screen -->
    <style>
        /* FOUC Prevention - Hide content until styles are loaded */
        .fouc-prevention {
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        
        .fouc-prevention.loaded {
            visibility: visible;
            opacity: 1;
        }
        
        /* Loading screen */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #121212 0%, #1a1a1a 50%, #2d1b69 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        
        .loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }
        
        .loading-logo {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }
        
        .loading-text {
            color: #B564F7;
            font-family: 'Poppins', sans-serif;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(181, 100, 247, 0.3);
            border-top: 3px solid #B564F7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Critical CSS to prevent flashing */
        body {
            background-color: #121212;
            color: #EAEAEA;
            font-family: 'Poppins', system-ui, -apple-system, sans-serif;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            margin: 0;
            padding: 0;
        }
        
        /* Basic layout styles to prevent layout shift */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
        }
        
        /* Prevent pride flag from flashing at full size */
        img[src*="progressflag"] {
            height: 1.5rem !important;
            width: auto !important;
            max-width: 1.5rem !important;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        /* Show flag after page loads */
        .flag-loaded img[src*="progressflag"] {
            opacity: 1;
        }
    </style>
    
    <!-- FOUC Prevention Script -->
    <script src="/js/fouc-prevention.js"></script>
    </head>
<body class="bg-gray-900 text-white p-8">
    <h1 class="text-3xl font-bold mb-6">Debug Venues API</h1>
    
    <button id="test-api" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded mb-4">
        Test Venues API
    </button>
    
    <div id="results" class="bg-gray-800 p-4 rounded"></div>
    
    <script>
        document.getElementById('test-api').addEventListener('click', async () => {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = 'Loading...';
            
            try {
                const response = await fetch('/.netlify/functions/get-venues-firestore');
                const data = await response.json();
                
                console.log('API Response:', data);
                
                let html = '<h2 class="text-xl font-bold mb-4">API Response:</h2>';
                html += `<p><strong>Total venues:</strong> ${data.venues ? data.venues.length : 'No venues array'}</p>`;
                html += `<p><strong>Version:</strong> ${data.version || 'Unknown'}</p>`;
                
                if (data.venues && data.venues.length > 0) {
                    html += '<h3 class="text-lg font-bold mt-4 mb-2">Venues:</h3>';
                    data.venues.forEach((venue, index) => {
                        html += `
                            <div class="border border-gray-600 p-3 mb-2 rounded">
                                <p><strong>${index + 1}. ${venue.name}</strong></p>
                                <p>ID: ${venue.id}</p>
                                <p>Slug: ${venue.slug || 'NO SLUG!'}</p>
                                <p>Address: ${venue.address}</p>
                                <p>Image: ${venue.image ? venue.image.url : 'No image'}</p>
                                <p>Categories: ${venue.category ? venue.category.join(', ') : 'No categories'}</p>
                                <a href="/venue/${venue.slug}" class="text-blue-400 hover:underline">Test Link: /venue/${venue.slug}</a>
                            </div>
                        `;
                    });
                } else {
                    html += '<p class="text-red-400">No venues found in response</p>';
                }
                
                resultsDiv.innerHTML = html;
                
            } catch (error) {
                resultsDiv.innerHTML = `<p class="text-red-400">Error: ${error.message}</p>`;
                console.error('Error testing API:', error);
            }
        });
    </script>
</body>
</html>
