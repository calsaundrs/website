<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Approved Events</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-8">Test Approved Events</h1>
        
        <div class="space-y-4">
            <button onclick="testApprovedEvents()" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded">
                Test Approved Events API
            </button>
            
            <button onclick="testAdminEvents()" class="bg-green-600 hover:bg-green-700 px-4 py-2 rounded ml-4">
                Test Admin Events API
            </button>
        </div>
        
        <div id="results" class="mt-8 p-4 bg-gray-800 rounded">
            <h2 class="text-xl font-bold mb-4">Results:</h2>
            <pre id="output" class="text-sm text-gray-300"></pre>
        </div>
    </div>

    <script>
        async function testApprovedEvents() {
            const output = document.getElementById('output');
            output.textContent = 'Testing approved events...';
            
            try {
                const response = await fetch('/.netlify/functions/test-approved-events');
                const data = await response.json();
                
                output.textContent = `Status: ${response.status}\nResponse: ${JSON.stringify(data, null, 2)}`;
            } catch (error) {
                output.textContent = `Error: ${error.message}`;
            }
        }
        
        async function testAdminEvents() {
            const output = document.getElementById('output');
            output.textContent = 'Testing admin events API...';
            
            try {
                const response = await fetch('/.netlify/functions/get-admin-events?status=approved');
                const data = await response.json();
                
                output.textContent = `Status: ${response.status}\nResponse: ${JSON.stringify(data, null, 2)}`;
            } catch (error) {
                output.textContent = `Error: ${error.message}`;
            }
        }
    </script>
</body>
</html>
