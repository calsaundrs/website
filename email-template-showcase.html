<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Email Template Preview | Admin Panel</title>
    <link rel="stylesheet" href="/css/tailwind.css">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="icon" href="/faviconV2.png" type="image/png">
    <script type="module" src="/js/auth-guard.js"></script>
    <meta name="admin-breadcrumb-section" content="System">
    <meta name="admin-breadcrumb-page" content="Email Templates">
    <script type="module" src="/js/admin-chrome.js"></script>
    <style>
        .preview-iframe {
            width: 100%;
            height: 720px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            background: #fff;
        }
        .control-panel {
            background: #0A0A0A;
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 8px;
        }
        .variant-toggle {
            cursor: pointer;
        }
        .variant-toggle input { accent-color: var(--color-toxic); }
    </style>
</head>
<body class="antialiased bg-[#050505] min-h-screen">
<div class="flex h-screen overflow-hidden">
    <div data-admin-sidebar></div>
    <div class="flex-1 flex flex-col h-full relative overflow-hidden bg-[#050505]">
        <div data-admin-topbar></div>
        <main class="flex-1 overflow-y-auto w-full">
            <div class="max-w-7xl mx-auto px-4 sm:px-8 py-8 md:py-12">
                <div class="mb-8">
                    <h1 class="font-display font-black tracking-wide text-3xl md:text-4xl text-white uppercase mb-2">Email Templates</h1>
                    <p class="text-gray-400">Preview every promoter and admin email under varied input. Toggles re-render the iframe instantly.</p>
                </div>

                <div id="previews" class="space-y-12"></div>
            </div>
        </main>
    </div>
</div>

<script>
const TEMPLATES = [
    {
        type: 'submission_confirmation',
        title: 'Submission confirmation',
        sub: 'Sent to the promoter when an event submission lands in the queue.',
        controls: [
            { kind: 'select', key: 'preset', label: 'Event name', options: [
                { value: 'short', label: 'Short — "Pride Night"', data: { eventName: 'Pride Night' } },
                { value: 'apostrophe', label: 'With apostrophe — "Cal\'s Drag Brunch"', data: { eventName: "Cal's Drag Brunch" } },
                { value: 'long', label: 'Long — "Saturday Night Drag Brunch Spectacular Featuring The Cast Of Drag Race UK"', data: { eventName: 'Saturday Night Drag Brunch Spectacular Featuring The Cast Of Drag Race UK' } },
            ]},
            { kind: 'select', key: 'idStyle', label: 'Submission ID', options: [
                { value: 'short', label: 'Short — "evt-pride-001"', data: { eventId: 'evt-pride-001' } },
                { value: 'uuid', label: 'UUID — "a3f9c8e2-..."', data: { eventId: 'a3f9c8e2-7d4b-4e1a-9f3c-8b2d1c4e5f6a' } },
            ]},
        ],
    },
    {
        type: 'approval_notification',
        title: 'Approval — "You\'re live"',
        sub: 'Sent when an admin approves a submission. The hero image, date, and venue are optional extras.',
        controls: [
            { kind: 'checkbox', key: 'image', label: 'Hero image (mini-poster)', value: 'https://res.cloudinary.com/dbxhpjoiz/image/upload/v1750526040/brumoutloud_venues/cghnw3anncyelp8q6bqi.jpg' },
            { kind: 'checkbox', key: 'eventDate', label: 'Date + time block', value: '2026-05-23' },
            { kind: 'checkbox', key: 'venueName', label: 'Venue name', value: 'The Village Inn' },
        ],
    },
    {
        type: 'rejection_notification',
        title: 'Rejection — "Needs a tweak"',
        sub: 'Sent when an admin rejects with a reason. Resubmit token deep-links back into the prefilled form.',
        controls: [
            { kind: 'select', key: 'reason', label: 'Reason length', options: [
                { value: 'short', label: 'Short — one sentence', data: { reason: 'The description is too short.' } },
                { value: 'medium', label: 'Medium — typical', data: { reason: 'The description was too short — could you flesh it out a bit so attendees know what to expect?' } },
                { value: 'long', label: 'Long — multi-paragraph', data: { reason: "The description was too short for what we need. We're looking for a few sentences covering the vibe of the night, what acts are performing, ticket info, and accessibility. Have a look at any of our approved listings for examples — drag brunch listings tend to land in the right shape. Drop the updated copy into the form via the button below and we'll get it back in the queue." } },
            ]},
            { kind: 'checkbox', key: 'resubmitUrl', label: 'Resubmit-link CTA (signed token)', value: 'https://brumoutloud.co.uk/promoter-submit-new?resubmit=test-token-abc' },
        ],
    },
    {
        type: 'event_reminder',
        title: 'Event reminder — "Tomorrow"',
        sub: 'Sent to the promoter the day before their event.',
        controls: [
            { kind: 'select', key: 'eventName', label: 'Event name', options: [
                { value: 'short', label: 'Short', data: { eventName: 'Disco Inferno' } },
                { value: 'apostrophe', label: 'With apostrophe', data: { eventName: "Saturday's Pride Quiz" } },
            ]},
        ],
    },
    {
        type: 'admin_submission_alert',
        title: 'Admin submission alert',
        sub: 'Sent to the admin team for every submission, including anonymous ones.',
        controls: [
            { kind: 'checkbox', key: 'promoterEmail', label: 'Has promoter email (vs. anonymous)', value: 'promoter@example.com' },
        ],
    },
];

function buildControls(tpl, state) {
    return tpl.controls.map((c) => {
        if (c.kind === 'checkbox') {
            return `
                <label class="variant-toggle flex items-start gap-3 p-3 hover:bg-white/5 rounded">
                    <input type="checkbox" data-key="${c.key}" data-value="${c.value}" ${state[c.key] ? 'checked' : ''} class="mt-1">
                    <div>
                        <div class="text-sm font-medium text-white">${c.label}</div>
                        <div class="text-xs text-gray-500 mt-0.5 font-mono break-all">${c.value}</div>
                    </div>
                </label>
            `;
        }
        if (c.kind === 'select') {
            const options = c.options.map((o) =>
                `<option value="${o.value}" ${state[c.key] === o.value ? 'selected' : ''}>${o.label}</option>`
            ).join('');
            return `
                <label class="block p-3">
                    <div class="text-xs uppercase tracking-widest text-gray-400 font-bold mb-2">${c.label}</div>
                    <select data-key="${c.key}" class="w-full bg-[#111] border border-white/10 text-white px-3 py-2 rounded text-sm">${options}</select>
                </label>
            `;
        }
        return '';
    }).join('');
}

function buildData(tpl, state) {
    const data = {};
    for (const c of tpl.controls) {
        if (c.kind === 'checkbox') {
            if (state[c.key]) data[c.key] = c.value;
        } else if (c.kind === 'select') {
            const opt = c.options.find((o) => o.value === state[c.key]);
            if (opt && opt.data) Object.assign(data, opt.data);
        }
    }
    return data;
}

async function fetchPreview(templateType, data) {
    const res = await fetch('/.netlify/functions/get-email-template-preview', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ templateType, data }),
    });
    return res.json();
}

function buildSection(tpl) {
    const state = {};
    for (const c of tpl.controls) {
        if (c.kind === 'select') state[c.key] = c.options[0].value;
        if (c.kind === 'checkbox') state[c.key] = false;
    }

    const section = document.createElement('section');
    section.className = 'control-panel p-6';
    section.innerHTML = `
        <header class="mb-4 pb-4 border-b border-white/5">
            <h2 class="text-xl font-bold text-white mb-1">${tpl.title}</h2>
            <p class="text-sm text-gray-400">${tpl.sub}</p>
            <p class="text-xs text-gray-500 mt-2"><span class="font-bold">Subject:</span> <span data-subject>—</span></p>
        </header>
        <div class="grid lg:grid-cols-[260px_1fr] gap-6">
            <div data-controls class="space-y-1">${buildControls(tpl, state)}</div>
            <div class="relative">
                <div class="absolute inset-0 flex items-center justify-center text-gray-500 text-sm" data-loading>Loading…</div>
                <iframe class="preview-iframe" data-iframe sandbox></iframe>
            </div>
        </div>
    `;

    const iframe = section.querySelector('[data-iframe]');
    const subjectEl = section.querySelector('[data-subject]');
    const loading = section.querySelector('[data-loading]');

    async function refresh() {
        loading.style.display = '';
        const data = buildData(tpl, state);
        const result = await fetchPreview(tpl.type, data);
        if (result.success) {
            subjectEl.textContent = result.subject;
            iframe.srcdoc = result.htmlContent;
            iframe.onload = () => { loading.style.display = 'none'; };
        } else {
            iframe.srcdoc = `<pre style="padding:1rem;color:#900">${result.error || 'Render failed'}</pre>`;
            loading.style.display = 'none';
        }
    }

    section.querySelector('[data-controls]').addEventListener('change', (e) => {
        const key = e.target.dataset.key;
        if (!key) return;
        if (e.target.type === 'checkbox') state[key] = e.target.checked;
        else state[key] = e.target.value;
        refresh();
    });

    refresh();
    return section;
}

const root = document.getElementById('previews');
TEMPLATES.forEach((tpl) => root.appendChild(buildSection(tpl)));
</script>
</body>
</html>
