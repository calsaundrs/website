<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Status Check</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-4xl font-bold mb-8 text-center">
            <i class="fas fa-bug mr-3"></i>Debug Status Check
        </h1>
        
        <div class="bg-gray-800 rounded-lg p-6 mb-8">
            <h2 class="text-2xl font-bold mb-4">Event Status Analysis</h2>
            <p class="text-gray-300 mb-6">
                Check the current status values of events after migration to understand why pending events are showing.
            </p>
            
            <div class="flex gap-4 mb-6">
                <button id="check-all-events" class="bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-lg font-semibold transition-colors">
                    <i class="fas fa-list mr-2"></i>Check All Events
                </button>
                <button id="check-approved-only" class="bg-green-600 hover:bg-green-700 px-6 py-3 rounded-lg font-semibold transition-colors">
                    <i class="fas fa-check mr-2"></i>Check Approved Only
                </button>
                <button id="check-pending-only" class="bg-yellow-600 hover:bg-yellow-700 px-6 py-3 rounded-lg font-semibold transition-colors">
                    <i class="fas fa-clock mr-2"></i>Check Pending Only
                </button>
            </div>
        </div>
        
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Status Breakdown -->
            <div class="bg-gray-800 rounded-lg p-6">
                <h3 class="text-xl font-bold mb-4">Status Breakdown</h3>
                <div id="status-breakdown" class="space-y-4">
                    <div class="text-gray-400 text-center py-8">
                        <i class="fas fa-chart-pie text-4xl mb-4"></i>
                        <p>No status data yet</p>
                    </div>
                </div>
            </div>
            
            <!-- Event Details -->
            <div class="bg-gray-800 rounded-lg p-6">
                <h3 class="text-xl font-bold mb-4">Event Details</h3>
                <div id="event-details" class="space-y-4">
                    <div class="text-gray-400 text-center py-8">
                        <i class="fas fa-calendar text-4xl mb-4"></i>
                        <p>No event details yet</p>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Detailed Logs -->
        <div class="bg-gray-800 rounded-lg p-6 mt-8">
            <h3 class="text-xl font-bold mb-4">Detailed Logs</h3>
            <div id="logs" class="bg-gray-900 rounded-lg p-4 h-64 overflow-y-auto font-mono text-sm">
                <div class="text-gray-400">Ready to check status...</div>
            </div>
        </div>
    </div>

    <script>
        function log(message, type = 'info') {
            const logs = document.getElementById('logs');
            const timestamp = new Date().toLocaleTimeString();
            const color = type === 'error' ? 'text-red-400' : type === 'success' ? 'text-green-400' : 'text-gray-300';
            logs.innerHTML += `<div class="${color}">[${timestamp}] ${message}</div>`;
            logs.scrollTop = logs.scrollHeight;
        }

        function updateStatusBreakdown(data) {
            const breakdown = document.getElementById('status-breakdown');
            
            // Count statuses
            const statusCounts = {};
            data.forEach(event => {
                const status = event.status || 'unknown';
                statusCounts[status] = (statusCounts[status] || 0) + 1;
            });
            
            breakdown.innerHTML = `
                <div class="space-y-3">
                    ${Object.entries(statusCounts).map(([status, count]) => `
                        <div class="flex justify-between items-center p-3 bg-gray-700 rounded-lg">
                            <span class="font-semibold capitalize">${status}</span>
                            <span class="text-2xl font-bold ${status === 'approved' ? 'text-green-400' : status === 'pending' ? 'text-yellow-400' : 'text-gray-400'}">${count}</span>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function updateEventDetails(data) {
            const details = document.getElementById('event-details');
            
            details.innerHTML = `
                <div class="space-y-3 max-h-96 overflow-y-auto">
                    ${data.slice(0, 10).map(event => `
                        <div class="bg-gray-700 rounded-lg p-3">
                            <div class="flex justify-between items-start mb-2">
                                <span class="font-semibold">${event.name}</span>
                                <span class="text-sm px-2 py-1 rounded ${event.status === 'approved' ? 'bg-green-900 text-green-300' : event.status === 'pending' ? 'bg-yellow-900 text-yellow-300' : 'bg-gray-700 text-gray-300'}">${event.status}</span>
                            </div>
                            <div class="text-sm text-gray-400">
                                <div>ID: ${event.id}</div>
                                <div>Date: ${event.date}</div>
                                <div>Raw Status: "${event.status}"</div>
                            </div>
                        </div>
                    `).join('')}
                    ${data.length > 10 ? `<div class="text-center text-gray-400">... and ${data.length - 10} more events</div>` : ''}
                </div>
            `;
        }

        // Event Listeners
        document.getElementById('check-all-events').addEventListener('click', async () => {
            log('Checking all events status...', 'info');
            
            try {
                const response = await fetch('/.netlify/functions/get-admin-events');
                const data = await response.json();
                
                if (data.success) {
                    log(`Found ${data.events.length} events total`, 'success');
                    updateStatusBreakdown(data.events);
                    updateEventDetails(data.events);
                    
                    // Log status distribution
                    const statusCounts = {};
                    data.events.forEach(event => {
                        const status = event.status || 'unknown';
                        statusCounts[status] = (statusCounts[status] || 0) + 1;
                    });
                    
                    log('Status distribution:', 'info');
                    Object.entries(statusCounts).forEach(([status, count]) => {
                        log(`  ${status}: ${count} events`, 'info');
                    });
                } else {
                    log('Failed to get events', 'error');
                }
            } catch (error) {
                log(`Error: ${error.message}`, 'error');
            }
        });

        document.getElementById('check-approved-only').addEventListener('click', async () => {
            log('Checking approved events only...', 'info');
            
            try {
                const response = await fetch('/.netlify/functions/get-admin-events?status=approved');
                const data = await response.json();
                
                if (data.success) {
                    log(`Found ${data.events.length} approved events`, 'success');
                    updateStatusBreakdown(data.events);
                    updateEventDetails(data.events);
                } else {
                    log('Failed to get approved events', 'error');
                }
            } catch (error) {
                log(`Error: ${error.message}`, 'error');
            }
        });

        document.getElementById('check-pending-only').addEventListener('click', async () => {
            log('Checking pending events only...', 'info');
            
            try {
                const response = await fetch('/.netlify/functions/get-admin-events?status=pending');
                const data = await response.json();
                
                if (data.success) {
                    log(`Found ${data.events.length} pending events`, 'success');
                    updateStatusBreakdown(data.events);
                    updateEventDetails(data.events);
                } else {
                    log('Failed to get pending events', 'error');
                }
            } catch (error) {
                log(`Error: ${error.message}`, 'error');
            }
        });
    </script>
</body>
</html>
