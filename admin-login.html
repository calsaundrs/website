<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Performance: DNS prefetch and preconnect for external resources -->
    <link rel="preconnect" href="https://firestore.googleapis.com">
    <link rel="dns-prefetch" href="https://firestore.googleapis.com">
    <link rel="preconnect" href="https://www.googleapis.com">
    <link rel="dns-prefetch" href="https://www.googleapis.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Admin Login | Brum Out Loud</title>
    
    <link rel="stylesheet" href="/css/tailwind.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/tailwind.css">
    <link rel="icon" href="/faviconV2.png" type="image/png">

    <!-- FOUC Prevention: Critical CSS and Loading Screen -->
    <style>
        /* FOUC Prevention - Hide content until styles are loaded */
        .fouc-prevention {
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        
        .fouc-prevention.loaded {
            visibility: visible;
            opacity: 1;
        }
        
        /* Loading screen */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #121212 0%, #1a1a1a 50%, #2d1b69 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        
        .loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }
        
        .loading-logo {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }
        
        .loading-text {
            color: #B564F7;
            font-family: 'Poppins', sans-serif;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(181, 100, 247, 0.3);
            border-top: 3px solid #B564F7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Critical CSS to prevent flashing */
        body {
            background-color: #121212;
            color: #EAEAEA;
            font-family: 'Poppins', system-ui, -apple-system, sans-serif;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            margin: 0;
            padding: 0;
        }
        
        /* Basic layout styles to prevent layout shift */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
        }
        
        /* Prevent pride flag from flashing at full size */
        img[src*="progressflag"] {
            height: 1.5rem !important;
            width: auto !important;
            max-width: 1.5rem !important;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        /* Show flag after page loads */
        .flag-loaded img[src*="progressflag"] {
            opacity: 1;
        }
    </style>
    </head>
<body class="bg-[#050505] text-[var(--color-light)] font-sans antialiased flex items-center justify-center min-h-screen">
<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-MMTDFZGH"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->

    <main class="px-8 py-8 relative z-10 w-full flex justify-center">
        <section class="max-w-md w-full">
            <div class="text-center mb-10">
                <div class="flex items-center justify-center space-x-3 mb-6">
                    <div class="w-10 h-10 rounded bg-gradient-to-br from-purple-500 to-indigo-600 flex items-center justify-center shadow-[0_0_20px_rgba(168,85,247,0.5)]">
                        <i class="fas fa-bolt text-lg text-white"></i>
                    </div>
                </div>
                <h1 class="font-display font-black tracking-wider uppercase text-2xl text-white mb-2">EVENTFLOW</h1>
                <p class="text-gray-500 text-sm font-medium tracking-widest uppercase">Admin Authenticaton</p>
            </div>

            <form id="login-form" class="bg-[#0A0A0A] border border-white/5 p-8 md:p-10 rounded-xl shadow-2xl relative overflow-hidden">
                <!-- Subtle top border highlight -->
                <div class="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-purple-500/50 to-transparent"></div>

                <div class="space-y-6">
                    <div>
                        <label for="email" class="block text-xs font-bold uppercase tracking-widest text-gray-400 mb-2">Email</label>
                        <input type="email" id="email" name="email" required placeholder="admin@brumoutloud.co.uk" class="w-full px-4 py-3 bg-[#111] border border-white/10 rounded focus:ring-2 focus:ring-[var(--color-toxic)] focus:border-transparent outline-none text-white transition-all placeholder:text-gray-700">
                    </div>
                    <div>
                        <label for="password" class="block text-xs font-bold uppercase tracking-widest text-gray-400 mb-2">Password</label>
                        <input type="password" id="password" name="password" required placeholder="••••••••" class="w-full px-4 py-3 bg-[#111] border border-white/10 rounded focus:ring-2 focus:ring-[var(--color-toxic)] focus:border-transparent outline-none text-white transition-all placeholder:text-gray-700">
                    </div>
                    
                    <div class="pt-4">
                        <button type="submit" class="w-full py-4 rounded text-sm font-bold uppercase tracking-widest text-black bg-[var(--color-toxic)] hover:bg-white transition-colors duration-200 shadow-[0_0_15px_rgba(204,255,0,0.3)]">
                            Sign In
                        </button>
                    </div>
                    <div id="error-message" class="text-red-400 text-sm font-semibold text-center mt-4 hidden"></div>
                </div>
            </form>
            
            <div class="text-center mt-8">
                <a href="/" class="text-xs font-bold uppercase tracking-widest text-gray-500 hover:text-white transition-colors">
                    <i class="fas fa-arrow-left mr-2"></i>Back to Live Site
                </a>
            </div>
        </section>
    </main>
    
    <!-- Firebase SDKs -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js";
      import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-auth.js";
      
      const firebaseConfig = {
        apiKey: "AIzaSyAg8EIRoDGo3uPP0oCXAtDL7xNreJQeY7k",
        authDomain: "brumoutloud-3dd92.firebaseapp.com",
        projectId: "brumoutloud-3dd92",
        storageBucket: "brumoutloud-3dd92.appspot.com",
        messagingSenderId: "803476014859",
        appId: "1:803476014859:web:660ab2967e64955b0d440e"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);

      const loginForm = document.getElementById('login-form');
      const errorMessage = document.getElementById('error-message');

      loginForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          const email = loginForm.email.value;
          const password = loginForm.password.value;
          
          try {
              await signInWithEmailAndPassword(auth, email, password);
              // On success, redirect to the main admin settings page
              window.location.href = '/admin/settings';
          } catch (error) {
              console.error("Firebase Auth Error:", error);
              errorMessage.textContent = "Error: Invalid email or password.";
              errorMessage.classList.remove('hidden');
          }
      });
    </script>
</body>
</html>
