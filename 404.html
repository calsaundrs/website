<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Performance: DNS prefetch and preconnect for external resources -->
    <link rel="preconnect" href="https://firestore.googleapis.com">
    <link rel="dns-prefetch" href="https://firestore.googleapis.com">
    <link rel="preconnect" href="https://www.googleapis.com">
    <link rel="dns-prefetch" href="https://www.googleapis.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found (404) | Brum Outloud</title>
    <meta name="description" content="Sorry, the page you're looking for doesn't exist. Let us help you find what you're looking for in Birmingham's LGBTQ+ scene.">
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">

    <link rel="stylesheet" href="/css/tailwind.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="/css/main.css">

    <style>
        :root {
            --color-bg: #0D0115;
            --color-light: #f3e8ff;
            --color-toxic: #CCFF00;
            --color-purple: #9B5DE5;
            --color-pink: #E83A99;
        }
        body {
            background: var(--color-bg);
            color: var(--color-light);
            font-family: 'Space Grotesk', system-ui, sans-serif;
            min-height: 100vh;
            margin: 0;
        }
        .font-display { font-family: 'Syne', sans-serif; }
        .misprint { letter-spacing: -0.03em; line-height: 0.95; }

        

        

        .nav-card {
            border: 4px solid var(--color-light);
            box-shadow: 6px 6px 0 var(--color-purple);
            background: #000;
            padding: 1.5rem;
            text-align: center;
            transition: all 0.2s ease;
            text-decoration: none;
            color: inherit;
        }
        .nav-card:hover {
            transform: translate(-3px, -3px);
            box-shadow: 10px 10px 0 var(--color-pink);
        }

        .search-box {
            width: 100%;
            padding: 0.75rem 3rem 0.75rem 1rem;
            border: 3px solid var(--color-light);
            background: #000;
            color: var(--color-light);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            font-weight: 600;
        }
        .search-box:focus {
            border-color: var(--color-toxic);
            outline: none;
        }
        .search-btn {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 3rem;
            background: var(--color-toxic);
            color: #000;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
        }
        .search-btn:hover {
            background: #fff;
        }
    </style>

    <script src="/js/fouc-prevention.js"></script>

    <!-- Google Tag Manager -->
    
    <script src="/js/main.js"></script>
</body>
</html>
