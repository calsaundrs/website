<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Rebuild Function</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #1a1a1a; color: white; }
        .button { background: #E83A99; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin: 10px; }
        .button:hover { background: #D61F69; }
        .button:disabled { background: #666; cursor: not-allowed; }
        .result { margin: 20px 0; padding: 10px; border-radius: 5px; }
        .success { background: rgba(34, 197, 94, 0.2); border: 1px solid #22c55e; }
        .error { background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; }
        .loading { background: rgba(59, 130, 246, 0.2); border: 1px solid #3b82f6; }
    </style>

    <!-- FOUC Prevention: Critical CSS and Loading Screen -->
    <style>
        /* FOUC Prevention - Hide content until styles are loaded */
        .fouc-prevention {
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        
        .fouc-prevention.loaded {
            visibility: visible;
            opacity: 1;
        }
        
        /* Loading screen */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #121212 0%, #1a1a1a 50%, #2d1b69 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        
        .loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }
        
        .loading-logo {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }
        
        .loading-text {
            color: #B564F7;
            font-family: 'Poppins', sans-serif;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(181, 100, 247, 0.3);
            border-top: 3px solid #B564F7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Critical CSS to prevent flashing */
        body {
            background-color: #121212;
            color: #EAEAEA;
            font-family: 'Poppins', system-ui, -apple-system, sans-serif;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            margin: 0;
            padding: 0;
        }
        
        /* Basic layout styles to prevent layout shift */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
        }
        
        /* Prevent pride flag from flashing at full size */
        img[src*="progressflag"] {
            height: 1.5rem !important;
            width: auto !important;
            max-width: 1.5rem !important;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        /* Show flag after page loads */
        .flag-loaded img[src*="progressflag"] {
            opacity: 1;
        }
    </style>
    
    <!-- FOUC Prevention Script -->
    <script src="/js/fouc-prevention.js"></script>
    </head>
<body>
    <h1>Test Rebuild Function</h1>
    
    <button id="test-rebuild" class="button">Test Rebuild Function</button>
    <button id="test-api" class="button">Test Venues API</button>
    
    <div id="results"></div>

    <script>
        document.getElementById('test-rebuild').addEventListener('click', async () => {
            const resultsDiv = document.getElementById('results');
            const button = document.getElementById('test-rebuild');
            
            button.disabled = true;
            resultsDiv.innerHTML = '<div class="result loading">Testing rebuild function...</div>';
            
            try {
                console.log('Testing rebuild function...');
                const response = await fetch('/.netlify/functions/build-venues-ssg', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        action: 'rebuild',
                        source: 'test-page'
                    })
                });
                
                console.log('Response status:', response.status);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const result = await response.json();
                console.log('Rebuild result:', result);
                
                if (result.success) {
                    resultsDiv.innerHTML = `<div class="result success">
                        <h3>✅ Rebuild Successful!</h3>
                        <p><strong>Files generated:</strong> ${result.generatedFiles || 0}</p>
                        <p><strong>Timestamp:</strong> ${result.timestamp}</p>
                        <p><strong>Source:</strong> ${result.source}</p>
                    </div>`;
                } else {
                    throw new Error(result.error || 'Unknown error');
                }
                
            } catch (error) {
                console.error('Error testing rebuild:', error);
                resultsDiv.innerHTML = `<div class="result error">
                    <h3>❌ Rebuild Failed</h3>
                    <p><strong>Error:</strong> ${error.message}</p>
                </div>`;
            } finally {
                button.disabled = false;
            }
        });

        document.getElementById('test-api').addEventListener('click', async () => {
            const resultsDiv = document.getElementById('results');
            const button = document.getElementById('test-api');
            
            button.disabled = true;
            resultsDiv.innerHTML = '<div class="result loading">Testing venues API...</div>';
            
            try {
                console.log('Testing venues API...');
                const response = await fetch('/.netlify/functions/get-venues-firestore');
                
                console.log('Response status:', response.status);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                console.log('API result:', data);
                
                resultsDiv.innerHTML = `<div class="result success">
                    <h3>✅ API Test Successful!</h3>
                    <p><strong>Total venues:</strong> ${data.venues ? data.venues.length : 'No venues array'}</p>
                    <p><strong>Version:</strong> ${data.version || 'Unknown'}</p>
                    ${data.venues && data.venues.length > 0 ? `
                        <h4>First few venues:</h4>
                        <ul>
                            ${data.venues.slice(0, 3).map(venue => `
                                <li><strong>${venue.name}</strong> - Slug: ${venue.slug || 'NO SLUG'}</li>
                            `).join('')}
                        </ul>
                    ` : '<p>No venues found</p>'}
                </div>`;
                
            } catch (error) {
                console.error('Error testing API:', error);
                resultsDiv.innerHTML = `<div class="result error">
                    <h3>❌ API Test Failed</h3>
                    <p><strong>Error:</strong> ${error.message}</p>
                </div>`;
            } finally {
                button.disabled = false;
            }
        });
    </script>
</body>
</html>
