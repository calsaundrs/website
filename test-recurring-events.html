<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Recurring Events</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-8">
    <div class="max-w-2xl mx-auto">
        <h1 class="text-3xl font-bold mb-8">Test Recurring Events Submission</h1>
        
        <form id="test-form" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold mb-2">Event Name</label>
                <input type="text" name="event-name" value="Test Recurring Event" class="w-full p-3 bg-gray-800 rounded border">
            </div>
            
            <div>
                <label class="block text-sm font-semibold mb-2">Description</label>
                <textarea name="description" class="w-full p-3 bg-gray-800 rounded border">This is a test recurring event</textarea>
            </div>
            
            <div>
                <label class="block text-sm font-semibold mb-2">Date</label>
                <input type="date" name="date" value="2025-02-15" class="w-full p-3 bg-gray-800 rounded border">
            </div>
            
            <div>
                <label class="block text-sm font-semibold mb-2">Start Time</label>
                <input type="time" name="start-time" value="19:00" class="w-full p-3 bg-gray-800 rounded border">
            </div>
            
            <div>
                <label class="block text-sm font-semibold mb-2">Category</label>
                <select name="category-select" class="w-full p-3 bg-gray-800 rounded border">
                    <option value="Social">Social</option>
                </select>
            </div>
            
            <div>
                <label class="block text-sm font-semibold mb-2">Contact Name</label>
                <input type="text" name="contact-name" value="Test User" class="w-full p-3 bg-gray-800 rounded border">
            </div>
            
            <div>
                <label class="block text-sm font-semibold mb-2">Contact Email</label>
                <input type="email" name="contact-email" value="test@example.com" class="w-full p-3 bg-gray-800 rounded border">
            </div>
            
            <div>
                <label class="block text-sm font-semibold mb-2">Venue ID</label>
                <input type="text" name="venue-id" value="test-venue" class="w-full p-3 bg-gray-800 rounded border">
            </div>
            
            <div class="flex items-center">
                <input type="checkbox" name="is-recurring" value="true" checked class="mr-2">
                <label class="text-sm font-semibold">This is a recurring event</label>
            </div>
            
            <div>
                <label class="block text-sm font-semibold mb-2">Recurring Pattern</label>
                <select name="recurring-pattern" class="w-full p-3 bg-gray-800 rounded border">
                    <option value="weekly">Weekly</option>
                    <option value="bi-weekly">Bi-weekly</option>
                    <option value="monthly">Monthly</option>
                    <option value="yearly">Yearly</option>
                </select>
            </div>
            
            <div>
                <label class="block text-sm font-semibold mb-2">Recurring Start Date</label>
                <input type="date" name="recurring-start-date" value="2025-02-15" class="w-full p-3 bg-gray-800 rounded border">
            </div>
            
            <div>
                <label class="block text-sm font-semibold mb-2">Max Instances</label>
                <input type="number" name="max-instances" value="4" class="w-full p-3 bg-gray-800 rounded border">
            </div>
            
            <button type="submit" class="w-full bg-purple-600 text-white p-3 rounded font-semibold">
                Submit Test Event
            </button>
        </form>
        
        <div id="result" class="mt-8 p-4 bg-gray-800 rounded hidden">
            <h2 class="text-xl font-bold mb-4">Result:</h2>
            <pre id="result-content" class="text-sm"></pre>
        </div>
    </div>
    
    <script>
        document.getElementById('test-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const form = e.target;
            const formData = new FormData(form);
            
            // Log form data
            console.log('Form data:');
            for (const [key, value] of formData.entries()) {
                console.log(`${key}: ${value}`);
            }
            
            try {
                const response = await fetch('/.netlify/functions/event-submission-firestore-only', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                document.getElementById('result').classList.remove('hidden');
                document.getElementById('result-content').textContent = JSON.stringify(result, null, 2);
                
                console.log('Response:', result);
                
            } catch (error) {
                document.getElementById('result').classList.remove('hidden');
                document.getElementById('result-content').textContent = `Error: ${error.message}`;
                console.error('Error:', error);
            }
        });
    </script>
</body>
</html>
